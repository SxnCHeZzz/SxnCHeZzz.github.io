const modules = [{"id": "m_intro_plus", "title": "00. Основы сетей: клиент, сервер, протокол", "notes": "\n<h3>Расширенный конспект: что обязательно понимать</h3>\n<p><b>Компьютерная сеть</b> — это не просто «несколько компьютеров с кабелем». Для экзамена важно помнить четыре слоя идеи: устройства, среда передачи, системное ПО и распределённые приложения. Без сетевых модулей ОС приложение не сможет использовать сокеты, TCP/UDP, IP и драйверы сетевой карты.</p>\n<table><tr><th>Понятие</th><th>Экзаменационная формулировка</th><th>Типичная ловушка</th></tr>\n<tr><td>Клиент</td><td>Инициирует запрос к сервису.</td><td>Клиент — не всегда «слабый компьютер», это роль процесса.</td></tr>\n<tr><td>Сервер</td><td>Постоянно готов принимать запросы и предоставлять услугу.</td><td>Сервером может быть программа, а не отдельная машина.</td></tr>\n<tr><td>Протокол</td><td>Определяет формат, порядок сообщений и реакции на события.</td><td>Протокол — не программа, а правила обмена.</td></tr>\n<tr><td>Служба</td><td>Полезная функция, предоставляемая клиентам: DNS, WWW, почта, SSH.</td><td>Одна служба может использовать несколько протоколов.</td></tr></table>\n<h3>Клиент-сервер, P2P и гибрид</h3>\n<p><b>Клиент-сервер</b>: центральный сервер хранит данные и/или обрабатывает запросы. Хорошо для контроля, авторизации, единой базы. Минусы — нагрузка на сервер и единая точка отказа.</p>\n<p><b>P2P</b>: узлы равноправны: каждый может и запрашивать, и отдавать данные. Это удобно для распределения нагрузки, но сложнее с поиском, доверием, NAT и безопасностью.</p>\n<p><b>Гибрид</b>: центральный сервер помогает найти участников или проверить вход, а данные идут напрямую между клиентами. Такой подход часто встречается в мессенджерах, играх, файлообмене.</p>\n<h3>Толстый, тонкий и сверхтонкий клиент</h3>\n<table><tr><th>Тип</th><th>Где логика/данные</th><th>Плюсы</th><th>Минусы</th></tr>\n<tr><td>Толстый</td><td>Много данных и обработки на клиенте.</td><td>Можно работать быстро локально, проще протокол.</td><td>Сложная синхронизация общих данных.</td></tr>\n<tr><td>Тонкий</td><td>Клиент отправляет операции на сервер.</td><td>Данные централизованы, проще согласованность.</td><td>Сложнее серверный протокол, зависимость от сети.</td></tr>\n<tr><td>Сверхтонкий</td><td>Интерфейс формирует сервер/удалённая система.</td><td>Не нужно ставить сложное ПО, достаточно браузера/RDP.</td><td>Ограничения стандартного клиента.</td></tr></table>\n<div class=\"exam\"><b>Формула ответа:</b> если вопрос про «спрятали страницу /admin» — это не защита. Защита должна быть на сервере: проверка пользователя, прав, сессии, роли и ограничений доступа.</div>\n\n<hr>\n\n<h3>Короткое резюме</h3>\n<p><b>Компьютерная сеть</b> — совокупность устройств, которые могут обмениваться информацией. В неё входят узлы, линии связи, сетевые модули ОС и распределённые приложения.</p>\n<table><tr><th>Понятие</th><th>Что помнить</th></tr>\n<tr><td>Сервер</td><td>Компьютер или программа, предоставляющая услугу.</td></tr>\n<tr><td>Клиент</td><td>Компьютер или программа, запрашивающая услугу.</td></tr>\n<tr><td>P2P</td><td>Каждый участник может быть и клиентом, и сервером.</td></tr>\n<tr><td>Протокол</td><td>Формат сообщений, порядок обмена и действия сторон.</td></tr>\n<tr><td>Тонкий клиент</td><td>Отправляет запросы серверу, не скачивая все данные.</td></tr>\n<tr><td>Толстый клиент</td><td>Скачивает данные и обрабатывает локально.</td></tr></table>\n<div class=\"exam\"><b>Ловушка:</b> «спрятанный URL» не защищает админку. Реальная защита — аутентификация, авторизация и ограничения доступа.</div>\n", "questions": [{"q": "Что входит в состав компьютерной сети в широком смысле?", "o": ["Компьютеры/узлы", "Линии связи и коммуникационное оборудование", "Модули ОС для сетевого взаимодействия", "Распределённые приложения", "Только браузер и сайт"], "a": [0, 1, 2, 3], "e": "Сеть — это не только кабель и компьютеры: нужны программные модули ОС и приложения, которые реально обмениваются данными.", "l": "00. Основы сетей: клиент, сервер, протокол", "tag": "00. Основы сетей: клиент, сервер, протокол", "globalIndex": 1}, {"q": "Почему скрытие админки за URL вроде /admin или /manager не является защитой?", "o": ["Боты перебирают распространённые скрытые адреса", "Доступ должен проверяться сервером", "DNS публикует все пути сайта", "HTTP сам отправляет скрытый путь поисковикам"], "a": [0, 1], "e": "Секретный URL может быть найден перебором или утечь. Без проверки прав любой знающий адрес попадёт на страницу.", "l": "00. Основы сетей: клиент, сервер, протокол", "tag": "00. Основы сетей: клиент, сервер, протокол", "globalIndex": 2}, {"q": "Какие утверждения верно описывают P2P?", "o": ["Участник может быть одновременно клиентом и сервером", "Все данные всегда идут только через центральный сервер", "Центральный сервер может помогать с поиском, а данные идти напрямую", "P2P невозможен в интернете"], "a": [0, 2], "e": "В P2P узлы равноправны. Гибридные схемы часто используют сервер для поиска/аутентификации, но передают данные напрямую.", "l": "00. Основы сетей: клиент, сервер, протокол", "tag": "00. Основы сетей: клиент, сервер, протокол", "globalIndex": 3}, {"q": "Что определяет протокол?", "o": ["Формат сообщений", "Очередность сообщений", "Действия при отправке/получении", "Физический цвет кабеля"], "a": [0, 1, 2], "e": "Протокол — это правила общения. Цвет кабеля не является частью протокола.", "l": "00. Основы сетей: клиент, сервер, протокол", "tag": "00. Основы сетей: клиент, сервер, протокол", "globalIndex": 4}, {"q": "Какой клиент называется тонким?", "o": ["Скачивает все данные и сам синхронизирует изменения", "Отправляет запросы серверу, не забирая всё состояние целиком", "Сервер строит GUI, клиентом служит браузер/RDP", "Работает без сети"], "a": [1], "e": "Тонкий клиент хранит меньше состояния и обращается к серверу для операций с данными.", "l": "00. Основы сетей: клиент, сервер, протокол", "tag": "00. Основы сетей: клиент, сервер, протокол", "globalIndex": 5}, {"q": "В чём недостаток толстого клиента при совместной работе с общими данными?", "o": ["Нужно синхронизировать изменения разных клиентов", "Он не может использовать стандартные протоколы", "Он всегда требует Kerberos", "Он не умеет работать по TCP"], "a": [0], "e": "Если несколько клиентов локально меняют копии данных, возникает проблема согласования изменений.", "l": "00. Основы сетей: клиент, сервер, протокол", "tag": "00. Основы сетей: клиент, сервер, протокол", "globalIndex": 6}, {"q": "Что является примером сверхтонкого клиента?", "o": ["Браузер для веб-приложения", "RDP-клиент", "Приложение, скачавшее всю базу локально", "BGP-маршрутизатор"], "a": [0, 1], "e": "Сверхтонкий клиент в основном показывает интерфейс, который формирует сервер или удалённая система.", "l": "00. Основы сетей: клиент, сервер, протокол", "tag": "00. Основы сетей: клиент, сервер, протокол", "globalIndex": 7}, {"q": "Что означает пропускная способность канала?", "o": ["Максимальная скорость передачи информации", "Время ping туда-обратно", "Количество портов TCP", "Количество пользователей сайта"], "a": [0], "e": "Пропускная способность — объём данных за время. Ping — задержка, а не скорость.", "l": "00. Основы сетей: клиент, сервер, протокол", "tag": "00. Основы сетей: клиент, сервер, протокол", "globalIndex": 8}]}, {"id": "m_history_plus", "title": "01. История: коммутация пакетов и Интернет", "notes": "\n<h3>Расширенный конспект: коммутация каналов против пакетов</h3>\n<p><b>Коммутация каналов</b> пришла из телефонии: перед разговором выделяется непрерывный путь через коммутаторы. Пока сеанс идёт, ресурс занят, даже если абоненты молчат. Для компьютерного трафика это плохо: обмен часто идёт всплесками, а простой канала превращается в потерю эффективности.</p>\n<p><b>Коммутация пакетов</b> решает эту проблему: сообщение делится на пакеты, каждый пакет содержит служебную информацию и пересылается промежуточными узлами дальше. Сеть работает как конвейер: освободившийся маршрутизатор может обслуживать другой поток, не ожидая конца чужого «сеанса».</p>\n<table><tr><th>Критерий</th><th>Каналы</th><th>Пакеты</th></tr>\n<tr><td>Ресурс</td><td>Выделен на весь сеанс.</td><td>Используется по мере прихода пакетов.</td></tr>\n<tr><td>Простой</td><td>Канал простаивает, но занят.</td><td>Сеть может обслуживать других.</td></tr>\n<tr><td>Отказоустойчивость</td><td>Путь фиксирован.</td><td>Пакеты можно направлять разными путями.</td></tr>\n<tr><td>Типичный пример</td><td>Классическая телефонная сеть.</td><td>ARPANET, Интернет.</td></tr></table>\n<h3>Исторические имена, которые нельзя путать</h3>\n<ul><li><b>Леонард Клейнрок</b> — теория и принципы коммутации пакетов.</li><li><b>ARPANET</b> — ранняя сеть, ставшая важным этапом к Интернету.</li><li><b>Тим Бернерс‑Ли</b> — World Wide Web: HTTP/HTML/URL как основа веба.</li><li><b>Роберт Меткалф</b> — Ethernet.</li></ul>\n<h3>Интернет как «сеть сетей»</h3>\n<p>Интернет — это не один гигантский Ethernet и не сеть одного владельца. Это множество автономных сетей, связанных маршрутизацией, пирингом, транзитом и точками обмена трафиком. Поэтому вопросы про Tier‑1, пиринг и IX логически относятся к истории развития глобальной сети.</p>\n<div class=\"hint\"><b>Запоминалка:</b> если спрашивают «почему пакеты лучше каналов для компьютеров?» — отвечай: освобождение ресурсов в паузах, конвейерная работа, лучшая масштабируемость.</div>\n\n<hr>\n\n<h3>Короткое резюме</h3>\n<table><tr><th>Коммутация каналов</th><th>Коммутация пакетов</th></tr>\n<tr><td>На время сеанса выделяется один путь/канал. Канал занят даже в паузах.</td><td>Данные делятся на пакеты, а маршрутизаторы пересылают их по мере готовности.</td></tr></table>\n<p>Главная идея пакетной коммутации — использовать сеть как конвейер и не держать весь путь занятым. В лекциях принцип связывается с Леонардом Клейнроком. ARPANET стала важным этапом перехода к «сети сетей».</p>\n<div class=\"hint\"><b>Для экзамена:</b> Бернерс-Ли — WWW, Меткалф — Ethernet, Клейнрок — коммутация пакетов.</div>\n", "questions": [{"q": "В чём ключевое преимущество коммутации пакетов перед коммутацией каналов?", "o": ["Можно освобождать узлы связи для других абонентов, не дожидаясь окончания сеанса", "Каждому пользователю выделяется вечный физический канал", "Пакеты всегда доставляются без задержек", "Можно отказаться от адресов"], "a": [0], "e": "Компьютерный трафик идёт рывками. Пакетная сеть не держит весь путь занятым во время пауз.", "l": "01. История: коммутация пакетов и Интернет", "tag": "01. История: коммутация пакетов и Интернет", "globalIndex": 9}, {"q": "Кем в лекции был разработан принцип коммутации пакетов?", "o": ["Леонардом Клейнроком", "Тимом Бернерсом-Ли", "Робертом Меткалфом", "Игорем Сысоевым"], "a": [0], "e": "Клейнрок связан с теорией пакетной коммутации. Бернерс-Ли — WWW, Меткалф — Ethernet.", "l": "01. История: коммутация пакетов и Интернет", "tag": "01. История: коммутация пакетов и Интернет", "globalIndex": 10}, {"q": "Как работает сеть с коммутацией пакетов?", "o": ["Как конвейер, где маршрутизаторы передают отдельные пакеты и могут обслуживать другие потоки", "Как единый физический проводник на весь сеанс", "Как строгая очередь соединений без адресов", "Как один главный маршрутизатор для всего интернета"], "a": [0], "e": "Пакеты пересылаются независимо, а узлы не резервируются целиком на всё время сеанса.", "l": "01. История: коммутация пакетов и Интернет", "tag": "01. История: коммутация пакетов и Интернет", "globalIndex": 11}, {"q": "Что стало следствием подключения внешних сетей к ARPANET?", "o": ["Сеть стала прообразом интернета как сети сетей", "ARPANET сразу стала полностью беспроводной", "Был создан HTML5", "DNS заменил IP"], "a": [0], "e": "Идея соединения разных сетей привела к понятию internetworking.", "l": "01. История: коммутация пакетов и Интернет", "tag": "01. История: коммутация пакетов и Интернет", "globalIndex": 12}, {"q": "Что такое Интернет в структурном смысле?", "o": ["Совокупность автономных сетей, соединённых друг с другом", "Один большой Ethernet-сегмент", "Одна сеть, управляемая одним центром", "Один DNS-сервер"], "a": [0], "e": "Интернет — это множество сетей разных владельцев, связанных пирингом, транзитом и точками обмена.", "l": "01. История: коммутация пакетов и Интернет", "tag": "01. История: коммутация пакетов и Интернет", "globalIndex": 13}, {"q": "Что отличает Tier-1 сеть?", "o": ["Достижимость всего интернета без покупки транзита благодаря пиринговым отношениям", "Бесплатный доступ для всех пользователей", "Запрет на точки обмена трафиком", "Использование только спутниковых линий"], "a": [0], "e": "Tier-1 — про глобальную достижимость без покупки транзита, а не про бесплатный доступ для всех.", "l": "01. История: коммутация пакетов и Интернет", "tag": "01. История: коммутация пакетов и Интернет", "globalIndex": 14}]}, {"id": "m_osi_plus", "title": "02. OSI и многоуровневые модели", "notes": "\n<h3>Расширенный конспект: зачем вообще уровни</h3>\n<p>Уровневая модель нужна, чтобы сложную сеть разбить на независимые части. Каждый уровень решает свою задачу, пользуется услугами нижнего и предоставляет интерфейс верхнему. Поэтому можно заменить реализацию протокола внутри уровня, если интерфейс для соседнего уровня сохранился.</p>\n<table><tr><th>Термин</th><th>Как отвечать на экзамене</th></tr>\n<tr><td>Протокол</td><td>Правила общения объектов одного уровня на разных машинах.</td></tr>\n<tr><td>Интерфейс</td><td>Набор функций/структур данных, доступных соседнему уровню.</td></tr>\n<tr><td>Служба</td><td>Функция, которую уровень выполняет для верхнего уровня.</td></tr>\n<tr><td>Инкапсуляция</td><td>Каждый уровень добавляет свой заголовок/служебные поля.</td></tr></table>\n<h3>Ключевые уровни, которые чаще всего путают</h3>\n<table><tr><th>Уровень</th><th>Адрес/единица данных</th><th>Главная задача</th><th>Примеры</th></tr>\n<tr><td>Канальный</td><td>MAC, кадр</td><td>Передача между непосредственно связанными узлами.</td><td>Ethernet, Wi‑Fi, ARP как связка IP→MAC.</td></tr>\n<tr><td>Сетевой</td><td>IP, пакет</td><td>Маршрутизация между сетями.</td><td>IPv4/IPv6, ICMP, маршрутизаторы.</td></tr>\n<tr><td>Транспортный</td><td>Порт, сегмент/датаграмма</td><td>Связь процессов, TCP/UDP, надёжность или скорость.</td><td>TCP, UDP.</td></tr>\n<tr><td>Прикладной</td><td>URL, домены, команды протокола</td><td>Конкретная услуга для пользователя/приложения.</td><td>HTTP, DNS, SMTP, SSH.</td></tr></table>\n<h3>Типичные экзаменационные ловушки</h3>\n<ul><li>MAC-адрес не используется для глобальной маршрутизации в Интернете; он нужен в пределах локального сегмента.</li><li>IP-адрес нужен маршрутизаторам для выбора следующего перехода.</li><li>Порт TCP/UDP нужен не компьютеру вообще, а процессу/службе на хосте.</li><li>Нижний уровень обычно не «читает смысл» пользовательских данных, а смотрит на свои поля заголовка.</li></ul>\n<div class=\"exam\"><b>Формула:</b> канальный уровень — «соседи в одном сегменте», сетевой — «путь между сетями», транспортный — «процессы и порты».</div>\n\n<hr>\n\n<h3>Короткое резюме</h3>\n<p>Уровневая архитектура упрощает совместную работу сетевого оборудования и ПО: каждый уровень использует службу нижнего и предоставляет интерфейс верхнему.</p>\n<table><tr><th>Термин</th><th>Суть</th></tr>\n<tr><td>Протокол</td><td>Правила взаимодействия объектов одного уровня на разных системах.</td></tr>\n<tr><td>Интерфейс</td><td>Функции и структуры данных, которые нижний уровень даёт верхнему.</td></tr>\n<tr><td>Служба</td><td>Функция, которую уровень предоставляет соседнему уровню.</td></tr></table>\n<table><tr><th>Уровень</th><th>Ключ</th></tr>\n<tr><td>Канальный</td><td>Кадры между непосредственно связанными узлами, MAC.</td></tr>\n<tr><td>Сетевой</td><td>IP-адресация и маршрутизация между сетями, best effort.</td></tr>\n<tr><td>Транспортный</td><td>Порты, TCP/UDP, связь процессов, надёжность/поток.</td></tr></table>\n", "questions": [{"q": "Зачем вводят многоуровневую сетевую архитектуру?", "o": ["Чтобы упростить совместную работу оборудования и ПО через стандартизованные интерфейсы", "Чтобы физический уровень гарантировал совместимость всех производителей", "Чтобы убрать необходимость маршрутизации", "Чтобы клиент всегда был толстым"], "a": [0], "e": "Главная идея — разделить обязанности уровней и зафиксировать интерфейсы между ними.", "l": "02. OSI и многоуровневые модели", "tag": "02. OSI и многоуровневые модели", "globalIndex": 15}, {"q": "Если меняется реализация протокола одного уровня, что нужно сохранить?", "o": ["Интерфейс для вышележащего уровня", "Все физические кабели", "Прикладную программу без изменений всегда невозможно", "DNS-зоны"], "a": [0], "e": "Верхний уровень не должен знать внутреннюю реализацию нижнего, если интерфейс прежний.", "l": "02. OSI и многоуровневые модели", "tag": "02. OSI и многоуровневые модели", "globalIndex": 16}, {"q": "Как нижний уровень понимает, какому протоколу верхнего уровня передать данные?", "o": ["По специальному идентификатору в заголовке", "По смыслу текста сообщения", "Передаёт всем протоколам сразу", "По имени пользователя ОС"], "a": [0], "e": "Например, EtherType или поле Protocol указывают следующий обработчик.", "l": "02. OSI и многоуровневые модели", "tag": "02. OSI и многоуровневые модели", "globalIndex": 17}, {"q": "Чем канальный уровень отличается от сетевого?", "o": ["Канальный передаёт кадры между непосредственно связанными узлами", "Канальный использует MAC-адреса в сегменте", "Сетевой строит маршрут между удалёнными сетями", "Сетевой всегда использует MAC вместо IP"], "a": [0, 1, 2], "e": "MAC и кадры — уровень 2; IP-маршрутизация между сетями — уровень 3.", "l": "02. OSI и многоуровневые модели", "tag": "02. OSI и многоуровневые модели", "globalIndex": 18}, {"q": "Что относится к транспортному уровню?", "o": ["Порты процессов", "TCP/UDP", "Контроль потока в TCP", "Выбор BGP-маршрута между автономными системами"], "a": [0, 1, 2], "e": "BGP-маршрутизация относится к сетевому/межсетевому уровню, а транспорт работает с процессами и портами.", "l": "02. OSI и многоуровневые модели", "tag": "02. OSI и многоуровневые модели", "globalIndex": 19}, {"q": "Что означает инкапсуляция?", "o": ["При движении вниз по стеку уровни добавляют свои заголовки", "На приёме заголовки снимаются в обратном порядке", "Все уровни используют один и тот же заголовок", "Инкапсуляция нужна только DNS"], "a": [0, 1], "e": "Каждый уровень добавляет служебную информацию для своего протокола.", "l": "02. OSI и многоуровневые модели", "tag": "02. OSI и многоуровневые модели", "globalIndex": 20}]}, {"id": "m_dns_web_plus", "title": "03–04. DNS, WWW, HTTP и веб-платформа", "notes": "\n<h3>Расширенный конспект: DNS</h3>\n<p><b>DNS</b> — распределённая иерархическая система имён. Она переводит доменные имена в адреса и другие записи. Корневой домен находится на вершине и обычно обозначается точкой; у него нет привычного имени вроде <code>root</code>.</p>\n<table><tr><th>Запись</th><th>Для чего нужна</th></tr>\n<tr><td>A / AAAA</td><td>IPv4 / IPv6 адрес имени.</td></tr>\n<tr><td>MX</td><td>Почтовые серверы домена.</td></tr>\n<tr><td>CNAME</td><td>Псевдоним на другое имя.</td></tr>\n<tr><td>NS</td><td>Авторитетные DNS-серверы зоны.</td></tr>\n<tr><td>TXT</td><td>Текстовые данные, часто SPF/DKIM/проверки владения.</td></tr></table>\n<p>DNS часто использует UDP/53: быстро и без соединения. Чтобы сопоставить ответ с запросом, клиент использует <b>Transaction ID</b>, а также адреса/порты. Если ответ слишком большой, сервер может поставить флаг <b>TC</b> — truncated, после чего клиент повторяет запрос по TCP.</p>\n<h3>WWW, URL и HTTP</h3>\n<p><b>WWW</b> — прикладная служба поверх Интернета, а не сам Интернет. Браузер — клиент, веб-сервер — сервер, HTTP/HTTPS — протокол взаимодействия. URL обычно содержит схему, имя сервера, порт при необходимости и путь к ресурсу.</p>\n<table><tr><th>Элемент HTTP</th><th>Зачем нужен</th></tr>\n<tr><td>Стартовая строка</td><td>Метод, путь и версия: <code>GET /index.html HTTP/1.1</code>.</td></tr>\n<tr><td>Заголовки</td><td>Метаданные: Host, Cookie, Content-Type, Content-Length.</td></tr>\n<tr><td>Пустая строка</td><td>Отделяет заголовки от тела.</td></tr>\n<tr><td>Тело</td><td>Данные POST/ответа, если они есть.</td></tr></table>\n<h3>HTTP/2, браузер и веб-платформа</h3>\n<p>HTTP/2 не совместим с HTTP/1.1 на уровне формата: он бинарный и поддерживает мультиплексирование потоков. В HTTPS версия часто согласуется через TLS ALPN. Старый способ <code>Upgrade</code> характернее для переходов внутри HTTP/1.1, но в реальном HTTPS-сценарии важен TLS.</p>\n<p>Браузер как платформа стал важен благодаря кроссплатформенности, JS-движкам, CSS, DOM, API браузера и возможности запускать один интерфейс на разных ОС. jQuery исторически помогал скрывать различия DOM/браузеров и дал удобные селекторы/манипуляции.</p>\n<div class=\"exam\"><b>Ловушки:</b> DNS не знает URL-пути; MX указывает почтовый сервер домена, а не порт POP3; GET не должен менять состояние, потому что браузер/прокси может повторить запрос.</div>\n\n<hr>\n\n<h3>DNS</h3>\n<table><tr><th>Элемент</th><th>Суть</th></tr>\n<tr><td>DNS</td><td>Распределённая служба имён, порт 53.</td></tr>\n<tr><td>Root</td><td>Корневой домен — пустая метка/точка.</td></tr>\n<tr><td>MX</td><td>Почтовый сервер домена.</td></tr>\n<tr><td>TC flag</td><td>Ответ DNS усечён, можно повторить по TCP.</td></tr>\n<tr><td>Query ID</td><td>Помогает сопоставить ответ с запросом.</td></tr></table>\n<h3>HTTP/WWW</h3>\n<p>HTTP-запрос состоит из стартовой строки, заголовков, пустой строки и тела. GET должен быть безопасным/идемпотентным. Cookie решают проблему сессии за NAT. HTTP/2 обычно согласуется через TLS ALPN.</p>\n<h3>Дополнения из работ</h3>\n<p>CGI медленный из-за запуска процесса на запрос; jQuery упрощала DOM и различия браузеров; Node.js дал JavaScript на сервере; Nginx стал популярен за эффективную работу с большим числом соединений; MIME используется не только в почте, но и в HTTP Content-Type.</p>\n", "questions": [{"q": "Какой порт ис пользуется и в HTTP Content-Type", "MIME создан только для FTP"], "a": [0, 1, 2], "e": "MIME описывает типы и упаковку содержимого; он вышел за рамки почты.", "l": "03–04. DNS, WWW, HTTP и веб-платформа", "tag": "03–04. DNS, WWW, HTTP и веб-платформа", "globalIndex": 31}, {"q": "Какие заслуги jQuery важны для экзамена?", "o": ["Удобные селекторы и DOM-манипуляции", "Скрытие различий браузеров", "Многие идеи позже вошли в стандарты", "Обязательное внедрение MVC"], "a": [0, 1, 2], "e": "jQuery была популярна из-за удобства DOM/AJAX и кроссбраузерности, а не из-за MVC.", "l": "03–04. DNS, WWW, HTTP и веб-платформа", "tag": "03–04. DNS, WWW, HTTP и веб-платформа", "globalIndex": 32}, {"q": "Как Node.js повлиял на веб-разработку?", "o": ["Позволил использовать JavaScript на сервере", "Событийная модель помогает обслуживать много соединений", "Отменил Same-Origin Policy", "Превратил браузер в TCP-сервер"], "a": [0, 1], "e": "Node.js дал серверный JS и неблокирующую событийную модель; браузерные политики безопасности не исчезли.", "l": "03–04. DNS, WWW, HTTP и веб-платформа", "tag": "03–04. DNS, WWW, HTTP и веб-платформа", "globalIndex": 33}, {"q": "Что стало причиной популярности Nginx?", "o": ["Эффективное обслуживание большого числа одновременных подключений", "Обязательный V8 внутри Nginx", "PHP из коробки как ядро сервера", "Запрет reverse proxy"], "a": [0], "e": "Nginx ценят за событийную архитектуру, reverse proxy, балансировку и работу с множеством соединений.", "l": "03–04. DNS, WWW, HTTP и веб-платформа", "tag": "03–04. DNS, WWW, HTTP и веб-платформа", "globalIndex": 34}]}, {"id": "m0", "title": "05. Почта и FTP", "notes": "\n<h3>Расширенный конспект: электронная почта</h3>\n<p>Почта состоит из нескольких ролей. <b>MUA</b> — почтовый клиент пользователя. <b>MTA</b> пересылает письма между серверами. <b>MDA</b> доставляет сообщение в ящик. Сервер получателя ищется через DNS-запись <b>MX</b>.</p>\n<table><tr><th>Протокол</th><th>Порт</th><th>Назначение</th><th>Что запомнить</th></tr>\n<tr><td>SMTP</td><td>25</td><td>Отправка и пересылка почты.</td><td>Исторически требует 7-битную ASCII-представимость данных.</td></tr>\n<tr><td>POP3</td><td>110</td><td>Скачивание писем клиентом.</td><td>Ближе к «толстому клиенту»: письма забираются на устройство.</td></tr>\n<tr><td>IMAP</td><td>143</td><td>Доступ к ящику на сервере.</td><td>Ближе к «тонкому клиенту»: письма и папки остаются на сервере.</td></tr></table>\n<h3>MIME и вложения</h3>\n<p>SMTP изначально ориентирован на текст. <b>MIME</b> добавляет способ передавать вложения, разные типы контента, кодировки и multipart-сообщения. Важные заголовки: <code>Content-Type</code>, <code>Content-Transfer-Encoding</code>, <code>Content-Disposition</code>. MIME вышел за рамки почты: <code>Content-Type</code> используется и в HTTP.</p>\n<h3>FTP: активный и пассивный режим</h3>\n<p>FTP использует управляющее соединение и отдельное соединение данных. В активном режиме сервер сам подключается к клиенту для передачи данных — это плохо проходит через NAT/firewall, потому что входящее соединение к клиенту часто запрещено. В пассивном режиме клиент сам открывает и управляющее, и data-соединение к серверу, поэтому за NAT обычно проще.</p>\n<table><tr><th>Режим</th><th>Кто открывает data-соединение</th><th>Проблема</th></tr>\n<tr><td>Active</td><td>Сервер к клиенту.</td><td>NAT/firewall клиента может не пустить входящее.</td></tr>\n<tr><td>Passive</td><td>Клиент к серверу.</td><td>Нужно разрешить диапазон портов на сервере.</td></tr></table>\n<div class=\"exam\"><b>Запомни:</b> POP3 «забирает», IMAP «управляет на сервере», SMTP «отправляет», MX «находит почтовый сервер домена».</div>\n\n<hr>\n\n<h3>Электронная почта: кто за что отвечает</h3>\n<p>Почта состоит из клиентов, почтовых серверов, SMTP для отправки и POP3/IMAP для чтения ящика.</p>\n<table><tr><th>Компонент</th><th>Роль</th><th>Протоколы/порты</th></tr>\n<tr><td>MUA</td><td>Почтовый клиент пользователя: создать, отправить, прочитать письмо</td><td>SMTP для отправки, POP3/IMAP для получения</td></tr>\n<tr><td>MTA</td><td>Пересылает почту между серверами</td><td>SMTP, обычно TCP 25</td></tr>\n<tr><td>MDA</td><td>Кладёт письмо в локальный ящик пользователя</td><td>локальная доставка, часто dovecot/procmail/maildrop</td></tr>\n<tr><td>DNS MX</td><td>Подсказывает, какой сервер принимает почту домена</td><td>DNS</td></tr></table>\n<p><b>Типовой путь письма:</b> клиент отправителя → SMTP-сервер отправителя → SMTP-сервер получателя → ящик получателя → чтение по POP3 или IMAP.</p>\n<ul><li><b>SMTP</b> — отправка и пересылка почты.</li><li><b>POP3</b> — простое скачивание писем, часто с удалением с сервера.</li><li><b>IMAP</b> — работа с почтовым ящиком на сервере, папки и синхронизация между устройствами.</li></ul>\n<h3>MIME и вложения</h3><p>SMTP исторически передавал 7-битный ASCII. Чтобы отправлять вложения, разные кодировки и HTML-письма, используют MIME: письмо становится составным, а бинарные файлы кодируются, например Base64.</p>\n<h3>FTP</h3><p>FTP нужен для передачи файлов и использует отдельное управляющее соединение и соединение данных. В активном режиме сервер подключается к клиенту для данных, в пассивном клиент сам подключается к серверу — это лучше проходит через NAT и firewall.</p>\n<div class=\"exam\"><b>Ловушка:</b> SMTP не используется для чтения почты получателем, а POP3/IMAP не пересылают письмо между почтовыми серверами.</div>\n", "questions": [{"l": "05. Почта и FTP", "q": "Письмо отправляется с клиента на почтовый сервер отправителя, затем на сервер получателя, а потом считывается адресатом. Какие протоколы участвуют в этих этапах в правильной роли?", "o": ["SMTP используется между клиентом отправителя и его почтовым сервером", "SMTP используется между почтовыми серверами отправителя и получателя", "POP3 или IMAP используются при чтении письма получателем", "POP3 используется для пересылки письма между почтовыми серверами", "IMAP используется вместо MX-записи для выбора сервера получателя"], "a": [0, 1, 2], "e": "SMTP переносит письмо к почтовому серверу и между серверами, а POP3/IMAP нужны уже для доступа получателя к своему ящику.", "globalIndex": 35, "tag": "05. Почта и FTP"}, {"l": "05. Почта и FTP", "q": "Почтовый демон получил письмо для адресата в другом домене. Какой шаг нужен, чтобы понять, куда по SMTP отправлять письмо дальше?", "o": ["Запросить MX-запись домена получателя в DNS", "Запросить PTR-запись IP-адреса отправителя", "Открыть POP3-сессию с клиентом получателя", "Прочитать поле BCC в письме", "Согласовать RTP timestamp"], "a": [0], "e": "MX-запись указывает почтовые серверы домена; POP3/IMAP не выбирают маршрут доставки между серверами.", "globalIndex": 36, "tag": "05. Почта и FTP"}, {"l": "05. Почта и FTP", "q": "В SMTP-сессии сервер ответил `354 Go ahead`. Какой следующий шаг клиента соответствует протоколу?", "o": ["Передать тело сообщения и завершить его строкой с одной точкой", "Сразу закрыть TCP-соединение без отправки DATA", "Запросить список писем командой LIST", "Начать FTP-соединение данных с порта 20", "Послать RCPT TO только после тела письма"], "a": [0], "e": "Код 354 выдается после DATA и означает готовность сервера принять тело письма до завершающей точки.", "globalIndex": 37, "tag": "05. Почта и FTP"}, {"l": "05. Почта и FTP", "q": "Какие утверждения о MIME и простом формате письма верны?", "o": ["MIME добавляет служебные заголовки вроде Content-Type", "MIME позволяет передавать несколько частей сообщения как multipart/mixed", "Base64 нужен, чтобы бинарное вложение можно было передать через текстовую почтовую инфраструктуру", "MIME заменяет SMTP как транспортный протокол", "Content-Transfer-Encoding определяет IP-маршрут письма"], "a": [0, 1, 2], "e": "MIME описывает структуру и кодирование содержимого письма, но не заменяет транспорт SMTP и не маршрутизирует IP-пакеты.", "globalIndex": 38, "tag": "05. Почта и FTP"}, {"l": "05. Почта и FTP", "q": "Пользователь читает один и тот же ящик с ноутбука, телефона и веб-интерфейса, при этом письма остаются на сервере. Какой вариант лучше соответствует лекции?", "o": ["IMAP, потому что он управляет письмами на сервере", "POP3, потому что он всегда хранит все письма только на сервере", "SMTP, потому что он запрашивает только заголовки писем", "FTP, потому что он поддерживает два TCP-соединения"], "a": [0], "e": "IMAP удобен для тонких клиентов и многоклиентского доступа: письма и состояние хранятся на сервере.", "globalIndex": 39, "tag": "05. Почта и FTP"}, {"l": "05. Почта и FTP", "q": "Какие пары протокол/порт из лекции сопоставлены верно?", "o": ["SMTP - 25", "POP3 - 110", "IMAP - 143", "FTP управляющее соединение - 21", "SSH - 21"], "a": [0, 1, 2, 3], "e": "В лекциях указаны SMTP 25, POP3 110, IMAP 143, FTP control 21; SSH по умолчанию работает на 22.", "globalIndex": 40, "tag": "05. Почта и FTP"}, {"l": "05. Почта и FTP", "q": "Почему POP3 в лекции связан с моделью «толстого почтового клиента»?", "o": ["Он реализует авторизацию и скачивание сообщений с сервера на клиент", "Он выполняет поиск и сортировку писем только на DNS-сервере", "Он требует, чтобы письмо перед отправкой было Base64", "Он управляет сообщениями преимущественно на сервере, как IMAP"], "a": [0], "e": "POP3 прост и обычно скачивает сообщения клиенту; больше серверных операций характерно для IMAP.", "globalIndex": 41, "tag": "05. Почта и FTP"}, {"l": "05. Почта и FTP", "q": "В чем смысл поля BCC в почтовом сообщении?", "o": ["Получатели из BCC не видны другим получателям письма", "BCC указывает серверу, какой MX выбрать первым", "BCC содержит MIME boundary", "BCC используется только для вложений base64"], "a": [0], "e": "BCC - скрытая копия; остальные адресаты не узнают о получателях из этого поля.", "globalIndex": 42, "tag": "05. Почта и FTP"}, {"l": "05. Почта и FTP", "q": "Какие утверждения об активном FTP-режиме верны?", "o": ["Управляющее соединение инициирует клиент к порту 21 сервера", "Для данных сервер подключается к порту, который сообщил клиент", "Со стороны сервера для данных используется порт 20", "Активный режим часто удобен за NAT, потому что все соединения инициирует клиент", "Активный режим использует только одно TCP-соединение"], "a": [0, 1, 2], "e": "В активном режиме управляющее соединение идет к 21 порту, а соединение данных открывает сервер к клиенту, что мешает NAT/firewall.", "globalIndex": 43, "tag": "05. Почта и FTP"}, {"l": "05. Почта и FTP", "q": "Почему пассивный FTP-режим обычно решает проблему клиента за NAT?", "o": ["Клиент сам инициирует и управляющее, и соединение данных", "Сервер сообщает клиенту порт для соединения данных", "FTP перестает использовать TCP", "Порт 21 становится портом передачи данных", "Клиенту не нужно принимать входящее соединение от сервера"], "a": [0, 1, 4], "e": "Пассивный режим переносит инициативу соединения данных на клиента, поэтому входящее подключение к клиенту не требуется.", "globalIndex": 44, "tag": "05. Почта и FTP"}, {"l": "05. Почта и FTP", "q": "В URL `ftp://user:password@ftp.server.ru` какая часть наиболее проблемна с точки зрения безопасности?", "o": ["Логин и пароль прямо включены в URL", "Имя сервера указано после символа @", "Используется доменное имя вместо IP-адреса", "URL не содержит MIME-Version"], "a": [0], "e": "Включение учетных данных в URL повышает риск утечки через историю, логи или копирование ссылки.", "globalIndex": 45, "tag": "05. Почта и FTP"}, {"l": "05. Почта и FTP", "q": "Какие функции относятся именно к почтовому серверу, а не к почтовому клиенту?", "o": ["Хранение почтовых ящиков", "Организация очереди сообщений", "Пересылка писем серверу получателя или пользователю", "Редактирование текста письма пользователем", "Просмотр письма в интерфейсе пользователя"], "a": [0, 1, 2], "e": "Сервер хранит ящики, пересылает сообщения и ведет очереди; создание и просмотр письма - функции клиента.", "globalIndex": 46, "tag": "05. Почта и FTP"}, {"l": "05. Почта и FTP", "q": "Если письмо с вложением содержит `Content-Type: multipart/mixed; boundary=...`, что это означает?", "o": ["Сообщение состоит из нескольких частей, разделенных boundary", "SMTP будет использовать несколько TCP-соединений", "Все части автоматически шифруются Kerberos", "Письмо нельзя передать через SMTP"], "a": [0], "e": "multipart/mixed описывает несколько MIME-частей, например текст письма и файл-вложение.", "globalIndex": 47, "tag": "05. Почта и FTP"}, {"l": "05. Почта и FTP", "q": "Какая ошибка в рассуждении: «раз письмо отправляется через браузер, SMTP больше не нужен»?", "o": ["Браузер может передать письмо веб-серверу по HTTP, но серверное приложение все равно отправляет письмо дальше", "HTTP автоматически заменяет MX-записи", "Браузер всегда открывает POP3-сессию к серверу получателя", "Веб-почта запрещает MIME"], "a": [0], "e": "Веб-интерфейс меняет клиентскую сторону, но дальнейшая доставка письма все равно выполняется почтовой инфраструктурой.", "globalIndex": 48, "tag": "05. Почта и FTP"}, {"l": "05. Почта и FTP", "q": "Какие варианты являются примерами почтовых клиентов из лекции?", "o": ["Microsoft Outlook", "Mozilla Thunderbird", "The Bat", "Postfix", "Dovecot"], "a": [0, 1, 2], "e": "Outlook, Thunderbird и The Bat - клиенты; Postfix и Dovecot относятся к серверной стороне/MDA.", "globalIndex": 49, "tag": "05. Почта и FTP"}, {"l": "05. Почта и FTP", "q": "Если SMTP-сервер возвращает `550 spam message discarded`, какой вывод наиболее точен?", "o": ["Транспортная SMTP-сессия дошла до этапа проверки, но сервер отклонил сообщение", "Клиент ошибся портом IMAP", "Письмо уже доставлено получателю по POP3", "Сервер требует переключиться на FTP passive mode"], "a": [0], "e": "Код 550 в примере означает отказ принять письмо, здесь из-за антиспам-фильтра.", "globalIndex": 50, "tag": "05. Почта и FTP"}, {"l": "05. Почта и FTP", "q": "Почему Base64 не стоит называть шифрованием?", "o": ["Base64 — это кодирование представления данных, а не защита секрета", "Любой может декодировать Base64 без ключа", "Base64 часто увеличивает размер данных примерно до 4/3 исходного", "Base64 всегда требует приватный ключ RSA", "Base64 гарантирует аутентичность отправителя"], "a": [0, 1, 2], "e": "Base64 нужен для текстового представления бинарных данных. Он не скрывает содержимое и не проверяет автора.", "globalIndex": 51, "tag": "05. Почта и FTP"}, {"l": "05. Почта и FTP", "q": "Что происходит с размером данных при Base64-кодировании?", "o": ["Каждые 3 байта исходных данных превращаются в 4 символа Base64", "Размер обычно увеличивается примерно на треть", "Размер всегда становится в 10 раз меньше", "Base64 удаляет все служебные заголовки SMTP", "Base64 меняет IP-адрес отправителя"], "a": [0, 1], "e": "Base64 кодирует 24 бита исходных данных четырьмя 6-битными символами, поэтому появляется накладной расход около 33%.", "globalIndex": 52, "tag": "05. Почта и FTP"}, {"l": "05. Почта и FTP", "q": "Алиса отправляет письмо с alisa@mail.ru на bob@yandex.ru. Почему SMTP-сервер mail.ru обычно требует авторизацию от клиента Алисы, а SMTP-сервер yandex.ru не требует авторизацию от mail.ru при приеме письма для Боба?", "o": ["mail.ru должен убедиться, что Алиса имеет право отправлять почту через его сервер", "yandex.ru принимает письмо для своего локального адресата и поэтому не требует авторизации у внешнего MTA", "Если бы yandex.ru требовал авторизацию у всех внешних MTA, обычная междоменная доставка почты сломалась бы", "SMTP между серверами всегда заменяется POP3", "Авторизация на первом шаге нужна только для вычисления MX-записи"], "a": [0, 1, 2], "e": "Submission от пользователя требует контроля, иначе сервер станет открытым релеем для спама. Прием письма для собственного домена от других MTA является нормальной частью SMTP-доставки.", "globalIndex": 53, "tag": "05. Почта и FTP"}, {"l": "05. Почта и FTP", "q": "Какие роли MUA, MTA и MDA в системе электронной почты сопоставлены правильно?", "o": ["MUA - пользовательский почтовый клиент", "MTA - сервер/агент пересылки почты между узлами", "MDA - агент доставки письма в почтовый ящик получателя", "MUA - DNS-сервер, выбирающий MX-запись", "MDA - протокол потокового видео"], "a": [0, 1, 2], "e": "MUA работает с пользователем, MTA пересылает письмо по SMTP, MDA помещает сообщение в локальный ящик или хранилище.", "globalIndex": 54, "tag": "05. Почта и FTP"}, {"l": "05. Почта и FTP", "q": "Какие POP3-команды позволяют узнать состояние ящика без загрузки тел всех писем?", "o": ["STAT сообщает количество сообщений и общий размер", "LIST сообщает размеры сообщений, обычно по номерам", "UIDL дает устойчивые уникальные идентификаторы сообщений", "DATA начинает передачу тела письма в SMTP", "PASV открывает пассивный режим FTP"], "a": [0, 1, 2], "e": "STAT, LIST и UIDL помогают клиенту понять состав ящика. DATA относится к SMTP, а PASV - к FTP.", "globalIndex": 55, "tag": "05. Почта и FTP"}, {"l": "05. Почта и FTP", "q": "FTP-сервер ответил на PASV: `227 Entering Passive Mode (78,34,21,65,15,61)`. Какие адрес и порт должен использовать клиент для соединения данных?", "o": ["IP-адрес 78.34.21.65", "Порт 3901", "Порт вычисляется как 15 * 256 + 61", "IP-адрес 15.61.78.34", "Порт всегда равен 21"], "a": [0, 1, 2], "e": "В ответе PASV первые четыре числа задают IP, а последние два кодируют порт: p1*256+p2 = 15*256+61 = 3901.", "globalIndex": 56, "tag": "05. Почта и FTP"}, {"l": "05. Почта и FTP", "q": "Почему передача множества маленьких файлов по FTP может быть заметно медленнее, чем работа с файлами через NFS или SMB?", "o": ["На каждый файл могут приходиться отдельные команды и дополнительные round-trip задержки", "FTP разделяет управляющее соединение и соединения передачи данных", "Накладные расходы на установление/согласование передачи становятся сравнимы с размером маленького файла", "FTP физически не умеет передавать файлы меньше MTU", "NFS и SMB всегда передают файлы без сети"], "a": [0, 1, 2], "e": "Для множества мелких файлов решают накладные расходы протокола и задержки на операции. Сетевые файловые системы лучше оптимизированы для такого рабочего режима.", "globalIndex": 57, "tag": "05. Почта и FTP"}]}, {"id": "m1", "title": "06. Потоковое мультимедиа", "notes": "\n<h3>Расширенный конспект: классы мультимедиа</h3>\n<table><tr><th>Класс</th><th>Пример</th><th>Главное требование</th></tr>\n<tr><td>Записанное потоковое</td><td>YouTube/видеофайл на сервере.</td><td>Можно начать смотреть до полной загрузки; допускается буферизация.</td></tr>\n<tr><td>Живое потоковое</td><td>Онлайн-трансляция.</td><td>Непрерывность, задержка может быть секунды/десятки секунд.</td></tr>\n<tr><td>Интерактивное реального времени</td><td>VoIP, видеозвонок, игра.</td><td>Малые задержки; часто UDP.</td></tr></table>\n<p>Для интерактивной речи задержки до ~150 мс обычно не мешают, больше — уже заметно. Для записанного видео важнее непрерывное воспроизведение, а не минимальная задержка.</p>\n<h3>RTP, RTCP, RTSP</h3>\n<table><tr><th>Протокол</th><th>Назначение</th></tr>\n<tr><td>RTP</td><td>Перенос аудио/видео в реальном времени. Поля помогают восстанавливать порядок и синхронизацию.</td></tr>\n<tr><td>SSRC</td><td>Идентификатор источника медиапотока в RTP.</td></tr>\n<tr><td>RTCP</td><td>Контроль качества, отчёты отправителя/получателя, статистика потерь и задержек.</td></tr>\n<tr><td>RTSP</td><td>Управление потоком: PLAY, PAUSE, DESCRIBE и т.п.; не обязан сам переносить медиа.</td></tr></table>\n<h3>Потери, TCP и adaptive bitrate</h3>\n<p>Если видео идёт через HTTP, оно обычно полагается на TCP: потерянные сегменты восстанавливаются, но это может задерживать загрузку. Для реального времени ждать повторной передачи часто хуже, чем потерять небольшой фрагмент; кодеки могут скрывать потери локальным ухудшением качества.</p>\n<p><b>Adaptive bitrate streaming</b>: сервер хранит несколько вариантов одного видео с разным битрейтом, разбитых на короткие сегменты. Плеер измеряет пропускную способность и запрашивает сегменты подходящего качества. Поэтому качество может меняться «на лету».</p>\n<div class=\"exam\"><b>Ловушка:</b> RTCP не передаёт само видео; он сообщает статистику. RTSP управляет воспроизведением, а не обязательно переносит медиаданные.</div>\n\n<hr>\n\n<h3>Виды потокового мультимедиа</h3>\n<table><tr><th>Тип</th><th>Суть</th><th>Требования</th></tr>\n<tr><td>Записанное видео/аудио</td><td>Файл заранее лежит на сервере: можно перематывать и ставить на паузу</td><td>важны буферизация и непрерывное воспроизведение</td></tr>\n<tr><td>Live streaming</td><td>Прямая трансляция, похожая на радио/ТВ через интернет</td><td>важны доставка вовремя и масштабирование на много клиентов</td></tr>\n<tr><td>Интерактивное реальное время</td><td>Видеозвонки, IP-телефония, игры</td><td>очень важны задержка, джиттер и потери</td></tr></table>\n<h3>Главные проблемы</h3>\n<ul><li><b>Задержка</b> — сколько времени пакет идёт от источника до получателя.</li><li><b>Джиттер</b> — колебание задержки между пакетами.</li><li><b>Потери</b> — часть пакетов не доходит.</li><li><b>Буфер</b> сглаживает джиттер, но увеличивает начальную задержку.</li></ul>\n<h3>Почему часто UDP</h3><p>Для реального времени лучше потерять старый пакет, чем ждать его повторной передачи. Поэтому RTP/RTCP часто работают поверх UDP. TCP хорош для надёжности, но повторные передачи могут создавать задержки.</p>\n<h3>CDN и адаптивный стриминг</h3><p>CDN размещает копии контента ближе к пользователю. Адаптивное видео меняет качество потока в зависимости от канала: при плохой сети качество падает, зато воспроизведение не останавливается.</p>\n", "questions": [{"l": "06. Потоковое мультимедиа", "q": "Пользователь смотрит записанный фильм и через несколько секунд после начала загрузки уже видит первые кадры. Какие свойства из лекции здесь проявляются?", "o": ["Потоковое воспроизведение", "Сохранение мультимедийных данных на сервере", "Непрерывное воспроизведение после старта", "Интерактивная связь с задержкой меньше 150 мс", "Kerberos-аутентификация"], "a": [0, 1, 2], "e": "Записанное потоковое мультимедиа хранится как файл, начинает проигрываться до полной загрузки и должно идти непрерывно.", "globalIndex": 58, "tag": "06. Потоковое мультимедиа"}, {"l": "06. Потоковое мультимедиа", "q": "Почему TCP может быть нежелателен для интерактивной речи, хотя он надежен?", "o": ["Восстановление потерянных пакетов может внести заметную задержку", "TCP не умеет передавать байты в порядке отправки", "TCP не поддерживает несколько клиентов", "TCP требует MX-записи для каждого пакета"], "a": [0], "e": "Для разговора устаревший пакет часто хуже потерянного: ожидание ретрансляции ломает временные ограничения.", "globalIndex": 59, "tag": "06. Потоковое мультимедиа"}, {"l": "06. Потоковое мультимедиа", "q": "Какие ситуации являются проявлением джиттера?", "o": ["Сервер отправляет пакеты каждые 0.1 с, а клиент иногда получает их через 0.2-0.3 с", "Несколько пакетов приходят сразу пачкой после задержки", "Письмо содержит BCC", "RTP-пакеты имеют одинаковый SSRC", "Буфер проигрывателя временно сглаживает неравномерность поступления"], "a": [0, 1, 4], "e": "Джиттер - неравномерность задержки. Буферизация не является причиной, но используется как способ сглаживания джиттера.", "globalIndex": 60, "tag": "06. Потоковое мультимедиа"}, {"l": "06. Потоковое мультимедиа", "q": "Что из перечисленного помогает RTP-приемнику обнаружить потерю или перестановку пакетов?", "o": ["Sequence Number", "Timestamp", "SSRC", "MX priority", "MIME boundary"], "a": [0], "e": "Sequence Number показывает порядковый номер RTP-пакета. Timestamp и SSRC решают другие задачи.", "globalIndex": 61, "tag": "06. Потоковое мультимедиа"}, {"l": "06. Потоковое мультимедиа", "q": "Какую задачу решает Timestamp в RTP-пакете?", "o": ["Помогает синхронизировать воспроизведение медиаданных", "Выбирает порт RTSP", "Определяет уровень Drop Precedence в DiffServ", "Хранит пароль SIP-пользователя"], "a": [0], "e": "Timestamp связан с временной привязкой медиаданных и нужен для корректного воспроизведения.", "globalIndex": 62, "tag": "06. Потоковое мультимедиа"}, {"l": "06. Потоковое мультимедиа", "q": "Какие утверждения о RTCP верны?", "o": ["RTCP используется вместе с RTP для контроля качества", "Receiver Report может сообщать о потерях и джиттере", "Sender Report может содержать статистику отправителя и временные метки", "RTCP обычно полностью заменяет RTP-поток", "RTCP относится к протоколам доступа к почтовому ящику"], "a": [0, 1, 2], "e": "RTCP не несет основной медиапоток, а передает контрольные отчеты и статистику качества.", "globalIndex": 63, "tag": "06. Потоковое мультимедиа"}, {"l": "06. Потоковое мультимедиа", "q": "Какие команды относятся к RTSP, а не к HTTP-загрузке файла?", "o": ["PLAY", "PAUSE", "TEARDOWN", "DESCRIBE", "MAIL FROM"], "a": [0, 1, 2, 3], "e": "RTSP управляет потоком с сервера; MAIL FROM относится к SMTP.", "globalIndex": 64, "tag": "06. Потоковое мультимедиа"}, {"l": "06. Потоковое мультимедиа", "q": "Почему простая передача видео через HTTP может быть недостаточной для платного или защищенного контента?", "o": ["В лекции указан недостаток: видео может сохраняться у пользователя на компьютере", "HTTP не умеет передавать байты", "Браузер не умеет начинать воспроизведение до полной загрузки", "HTTP всегда работает только поверх UDP"], "a": [0], "e": "HTTP-передача проста, но файл может оказаться сохраненным у пользователя, что не всегда приемлемо.", "globalIndex": 65, "tag": "06. Потоковое мультимедиа"}, {"l": "06. Потоковое мультимедиа", "q": "Какие технологии являются реализациями адаптивного потокового вещания?", "o": ["MPEG-DASH", "HLS", "Adobe HTTP Dynamic Streaming", "Microsoft Smooth Streaming", "POP3"], "a": [0, 1, 2, 3], "e": "Все четыре технологии перечислены в лекции как реализации adaptive bitrate streaming; POP3 относится к почте.", "globalIndex": 66, "tag": "06. Потоковое мультимедиа"}, {"l": "06. Потоковое мультимедиа", "q": "Почему multicast логически подходит для живого вещания, но часто заменяется другими схемами в глобальной сети?", "o": ["Много клиентов получают один и тот же поток", "Применение multicast ограничено сетью одного провайдера", "В глобальной сети часто используют CDN или P2P-подходы", "Multicast требует POP3", "Multicast запрещает UDP"], "a": [0, 1, 2], "e": "Для одной передачи многим клиентам multicast естественен, но межпровайдерская поддержка ограничена, поэтому используют CDN/P2P.", "globalIndex": 67, "tag": "06. Потоковое мультимедиа"}, {"l": "06. Потоковое мультимедиа", "q": "В чем идея P2PTV по сравнению с классической CDN-доставкой?", "o": ["Клиенты сами копируют части медиапотока друг другу", "Сервер отправляет только один поток, а распространение частично ложится на клиентов", "Каждый клиент обязательно получает весь поток только от центрального сервера", "P2PTV выполняет функцию SMTP-релея"], "a": [0, 1], "e": "P2PTV использует ресурсы клиентов для дальнейшей рассылки медиапотока.", "globalIndex": 68, "tag": "06. Потоковое мультимедиа"}, {"l": "06. Потоковое мультимедиа", "q": "Какие утверждения о SIP в лекции верны?", "o": ["SIP расшифровывается как Session Initiation Protocol", "SIP описывает установление соединения с удаленным клиентом", "SIP может согласовывать дополнительные каналы, например RTP", "SIP является протоколом скачивания почты", "SIP заменяет все медиапакеты RTP внутри разговора"], "a": [0, 1, 2], "e": "SIP устанавливает и управляет сеансом, а медиаданные обычно идут отдельными потоками, например RTP.", "globalIndex": 69, "tag": "06. Потоковое мультимедиа"}, {"l": "06. Потоковое мультимедиа", "q": "Какое утверждение о H.323 наиболее соответствует лекции?", "o": ["Это более старый набор стандартов для интерактивного аудио/видео реального времени", "Он используется вместо MIME в почте", "Он является современным обязательным протоколом OAuth", "Он нужен только для FTP passive mode"], "a": [0], "e": "H.323 описан как устаревший, но использовавшийся набор стандартов для VoIP и видеоконференций.", "globalIndex": 70, "tag": "06. Потоковое мультимедиа"}, {"l": "06. Потоковое мультимедиа", "q": "Какие элементы в URL ` , "q": "Какие утверждения про SIP верны?", "o": ["SIP расшифровывается как Session Initiation Protocol", "SIP используется для установления, изменения и завершения мультимедийных сеансов, например VoIP-звонков", "Типичные методы SIP включают INVITE, ACK, BYE, REGISTER", "SIP является кодеком сжатия голоса", "SIP заменяет IP-маршрутизацию"], "a": [0, 1, 2], "e": "SIP - сигнальный протокол для сеансов связи. Он не кодирует голос сам по себе, а управляет установлением и завершением сессии.", "globalIndex": 82, "tag": "06. Потоковое мультимедиа"}]}, {"id": "m2", "title": "06. NFS", "notes": "\n<h3>Расширенный конспект: зачем нужен NFS</h3>\n<p><b>NFS</b> даёт клиенту доступ к файлам на сервере так, будто они локальные. Пользователь и приложение работают через обычные файловые операции, а сеть скрыта за файловой системой.</p>\n<table><tr><th>Компонент</th><th>Роль</th></tr>\n<tr><td>ONC RPC</td><td>Удалённый вызов процедур: клиент вызывает операции на сервере.</td></tr>\n<tr><td>XDR</td><td>Единое представление данных для разных архитектур процессоров.</td></tr>\n<tr><td>VFS</td><td>Слой ОС, который скрывает различия конкретных файловых систем.</td></tr></table>\n<h3>Эволюция версий</h3>\n<table><tr><th>Версия</th><th>Что важно</th></tr>\n<tr><td>NFSv2</td><td>UDP, stateless, ограничение больших файлов из-за 32-битных смещений.</td></tr>\n<tr><td>NFSv3</td><td>TCP, 64-битные размеры/смещения, async writes, но в целом stateless.</td></tr>\n<tr><td>NFSv4</td><td>Stateful-подход, встроенная работа с безопасностью/Kerberos, один порт 2049, Compound RPC.</td></tr></table>\n<h3>Stateless, идемпотентность и Close-to-Open</h3>\n<p>В stateless NFS сервер не хранит состояние открытых файлов так, как локальная ФС. Поэтому операции должны быть безопасны при повторе: если клиент не получил ответ, он может повторить запрос. Это требует <b>идемпотентности</b> — повтор той же операции не должен ломать состояние.</p>\n<p><b>Close-to-Open Consistency</b>: изменения, сделанные клиентом A, гарантированно становятся видимы клиенту B после того, как A закрыл файл, а B открыл его заново. Это компромисс между производительностью и строгой согласованностью.</p>\n<p><b>Compound RPC</b> в NFSv4 позволяет упаковать несколько операций в один запрос и снизить сетевые задержки.</p>\n<div class=\"exam\"><b>Самое частое:</b> NFSv3 → NFSv4: переход к stateful, безопасности, одному основному порту и Compound RPC.</div>\n\n<hr>\n\n<h3>NFS простыми словами</h3><p>NFS — сетевая файловая система: клиент видит файлы на сервере почти как локальные. Цель — прозрачный доступ к файлам по сети.</p>\n<table><tr><th>Технология</th><th>Зачем нужна</th></tr>\n<tr><td>ONC RPC</td><td>Удалённый вызов процедур: клиент просит сервер выполнить файловую операцию</td></tr>\n<tr><td>XDR</td><td>Единый формат представления данных для разных архитектур</td></tr>\n<tr><td>VFS</td><td>Слой ОС, скрывающий детали конкретной файловой системы</td></tr></table>\n<h3>Версии</h3><ul><li><b>NFSv2</b> — старый вариант, UDP, stateless, ограничение 2 ГБ.</li><li><b>NFSv3</b> — поддержка TCP, 64-битные размеры/смещения, лучше для больших файлов.</li><li><b>NFSv4</b> — stateful, встроенные блокировки, лучше безопасность, один порт 2049.</li></ul>\n<h3>Что спрашивают</h3><p>Запомни различие stateless/stateful. Stateless сервер не хранит состояние клиента, поэтому проще восстанавливаться после сбоев, но сложнее делать блокировки. Stateful хранит состояние открытых файлов, блокировок и сессий.</p>\n", "questions": [{"l": "06. NFS", "q": "Приложение вызывает `open()` для файла, который находится на смонтированном NFS-ресурсе. Какая цепочка ближе всего к архитектуре из лекции?", "o": ["POSIX-вызов -> VFS -> NFS-клиент -> ONC RPC/XDR -> сеть -> rpc.nfsd", "POSIX-вызов -> SMTP -> MX -> POP3 -> файл", "VFS -> RTSP -> RTCP -> сервер хранения", "OAuth Client -> Authorization Server -> TGT"], "a": [0], "e": "VFS скрывает удаленность файла, NFS-клиент формирует RPC-запрос, XDR сериализует данные, сервер выполняет операцию.", "globalIndex": 83, "tag": "06. NFS"}, {"l": "06. NFS", "q": "Какие элементы обеспечивают переносимость NFS между разными архитектурами машин?", "o": ["XDR", "ONC RPC", "VFS", "Base64", "DSCP"], "a": [0], "e": "Именно XDR отвечает за представление данных независимо от порядка байт и архитектуры.", "globalIndex": 84, "tag": "06. NFS"}, {"l": "06. NFS", "q": "Почему VFS важен для прозрачности NFS?", "o": ["Приложение использует обычные системные вызовы и не обязано знать, что файл удаленный", "VFS шифрует каждый NFS-пакет", "VFS заменяет сервер rpc.nfsd", "VFS выдает Kerberos TGT"], "a": [0], "e": "VFS предоставляет единый интерфейс для разных файловых систем, включая NFS.", "globalIndex": 85, "tag": "06. NFS"}, {"l": "06. NFS", "q": "Какие утверждения о NFSv2 верны?", "o": ["Первая публичная версия описана в RFC 1094", "Работала поверх UDP", "Была stateless", "Поддерживала 64-битные смещения и файлы больше 2 ГБ", "Требовала единственный TCP-порт 2049 как NFSv4"], "a": [0, 1, 2], "e": "NFSv2 была публичной UDP/stateless-версией с ограничением 2 ГБ из-за 32-битных смещений.", "globalIndex": 86, "tag": "06. NFS"}, {"l": "06. NFS", "q": "Какие улучшения NFSv3 особенно важны для WAN и больших файлов?", "o": ["Поддержка TCP", "Переход на 64-битные смещения", "Асинхронная запись", "Полный отказ от stateless-модели", "Обязательное OpenID Connect"], "a": [0, 1, 2], "e": "NFSv3 добавил TCP, снял лимит 2 ГБ и ускорил запись, но принципиально stateful стал уже NFSv4.", "globalIndex": 87, "tag": "06. NFS"}, {"l": "06. NFS", "q": "Что из перечисленного относится к NFSv4?", "o": ["Stateful-архитектура", "Поддержка Kerberos", "Единый TCP-порт 2049", "Compound RPC", "Обязательная работа через rpcbind для mountd"], "a": [0, 1, 2, 3], "e": "NFSv4 интегрировал вспомогательные механизмы и ушел от набора динамических портов старых версий.", "globalIndex": 88, "tag": "06. NFS"}, {"l": "06. NFS", "q": "Почему rpcbind в NFSv3 создавал проблемы для firewall?", "o": ["Разные демоны получали динамические порты", "Клиент сначала должен был узнавать порт нужного демона через rpcbind", "Приходилось открывать широкий диапазон портов или жестко фиксировать их", "rpcbind всегда шифровал трафик, и firewall не мог видеть TCP", "NFSv3 работал только на 22 порту"], "a": [0, 1, 2], "e": "Динамические порты mountd/lockd/statd усложняли фильтрацию; NFSv4 упростил это единым портом.", "globalIndex": 89, "tag": "06. NFS"}, {"l": "06. NFS", "q": "Какая операция из списка неидемпотентна и поэтому опаснее при повторе RPC-запроса?", "o": ["REMOVE", "READ", "GETATTR", "LOOKUP"], "a": [0], "e": "Повтор REMOVE может иметь другой эффект, чем первое выполнение; чтение и получение атрибутов обычно безопаснее.", "globalIndex": 90, "tag": "06. NFS"}, {"l": "06. NFS", "q": "Зачем серверу NFSv3 reply cache?", "o": ["Чтобы при повторе неидемпотентного запроса вернуть тот же ответ, а не выполнить операцию снова", "Чтобы хранить все файлы клиентов в RAM", "Чтобы заменить close-to-open consistency", "Чтобы передавать OAuth refresh token"], "a": [0], "e": "Reply cache защищает от повторного выполнения операций вроде REMOVE/CREATE после сетевых повторов.", "globalIndex": 91, "tag": "06. NFS"}, {"l": "06. NFS", "q": "Какие утверждения о блокировках в старых NFS верны?", "o": ["В NFSv3 для блокировок использовался отдельный NLM", "Отдельные вспомогательные протоколы усложняли архитектуру", "В NFSv4 блокировки интегрированы в сам протокол", "NFSv2 вообще не работал с файлами"], "a": [0, 1, 2], "e": "Старые версии полагались на внешние демоны/протоколы, а NFSv4 встроил эти механизмы.", "globalIndex": 92, "tag": "06. NFS"}, {"l": "06. NFS", "q": "Почему Compound RPC особенно полезен в WAN?", "o": ["Он уменьшает число round-trip обменов", "Он упаковывает несколько операций в один запрос", "Он делает UDP надежнее TCP", "Он отключает Kerberos", "Он заменяет VFS"], "a": [0, 1], "e": "В сетях с большой задержкой объединение операций резко снижает суммарное время ожидания.", "globalIndex": 93, "tag": "06. NFS"}, {"l": "06. NFS", "q": "Клиент А имеет read delegation, клиент Б хочет открыть файл на запись. Что должен сделать сервер?", "o": ["Отозвать делегацию у клиента А через CB_RECALL", "Дождаться возврата делегации и сброса кэшей", "Сразу разрешить Б писать, не уведомляя А", "Выдать Б MX-запись", "Переключить протокол на POP3"], "a": [0, 1], "e": "Сервер должен сохранить согласованность: отозвать делегацию у А, дождаться возврата, затем продолжить операцию Б.", "globalIndex": 94, "tag": "06. NFS"}, {"l": "06. NFS", "q": "Какие утверждения о read и write delegation верны?", "o": ["Read delegation может быть у нескольких клиентов одновременно, если никто не пишет", "Write delegation обычно выдается единственному клиенту", "Делегации уменьшают число обращений к серверу", "Write delegation запрещает клиенту кэшировать данные", "Делегации существуют только в NFSv2"], "a": [0, 1, 2], "e": "Делегации дают клиенту локально читать/писать при гарантиях сервера, но могут быть отозваны.", "globalIndex": 95, "tag": "06. NFS"}, {"l": "06. NFS", "q": "Клиент А записал изменения, но еще не вызвал close(). Клиент Б открыл тот же файл. Что допускает модель close-to-open?", "o": ["Клиент Б может увидеть старую версию", "Свежая версия гарантируется только после close() А и последующего open() Б", "Все write() обязаны мгновенно синхронизироваться по сети", "NFS полностью запрещает кэширование записей"], "a": [0, 1], "e": "Close-to-open слабее строгой POSIX-консистентности, зато дает производительность в сети.", "globalIndex": 96, "tag": "06. NFS"}, {"l": "06. NFS", "q": "Почему отключение кэширования атрибутов через `actimeo=0` или `noac` может быть плохой идеей?", "o": ["Резко увеличится число GETATTR/RPC-запросов", "Производительность может сильно упасть", "Это гарантированно удалит все файлы", "Это переведет NFS на SMTP"], "a": [0, 1], "e": "Строгая актуальность атрибутов стоит дорого: каждый stat/ls чаще обращается к серверу.", "globalIndex": 97, "tag": "06. NFS"}, {"l": "06. NFS", "q": "Как NFS-клиент адаптирует время жизни кэша атрибутов?", "o": ["Для часто меняющегося файла уменьшает TTL кэша к acregmin", "Для стабильного файла увеличивает TTL кэша к acregmax", "Для директорий есть похожие параметры acdirmin/acdirmax", "Всегда хранит атрибуты ровно 24 часа", "Никогда не кэширует директории"], "a": [0, 1, 2], "e": "Лекция описывает адаптивные таймауты для файлов и директорий.", "globalIndex": 98, "tag": "06. NFS"}, {"l": "06. NFS", "q": "Что верно для режима `sync` при экспорте NFS?", "o": ["Сервер отвечает после физической записи данных или надежного кэша", "Режим надежнее при внезапном падении сервера", "Запись обычно медленнее", "Сервер отвечает сразу после помещения данных в page cache", "Это максимальная производительность с риском потери данных"], "a": [0, 1, 2], "e": "sync - write-through: надежнее, но медленнее, потому что ждет фиксации данных.", "globalIndex": 99, "tag": "06. NFS"}, {"l": "06. NFS", "q": "Что верно для режима `async` при экспорте NFS?", "o": ["Сервер может ответить до фактической записи на диск", "Производительность записи выше", "Есть риск потери данных при падении сервера", "Это всегда безопаснее sync", "Клиент никогда не получает подтверждение"], "a": [0, 1, 2], "e": "async - write-back: быстрее, но подтвержденные клиенту данные могут еще находиться только в памяти.", "globalIndex": 100, "tag": "06. NFS"}, {"l": "06. NFS", "q": "Почему классические stateless-идеи в NFS осложняют блокировки файлов?", "o": ["Блокировка требует помнить состояние: кто, какой файл и на какой срок заблокировал", "При сбое клиента или сервера нужно корректно восстановить или сбросить состояние блокировок", "Stateless-серверу проще обрабатывать независимые операции, чем долгоживущие блокировки", "Блокировки невозможны только потому, что в NFS нет IP-адресов", "Блокировки файлов требуют SMTP"], "a": [0, 1, 2], "e": "Файловые блокировки являются состоянием. Поэтому их трудно совместить с полностью stateless-моделью и восстановлением после сбоев.", "globalIndex": 101, "tag": "06. NFS"}, {"l": "06. NFS", "q": "Для каких систем исторически особенно характерно использование NFS?", "o": ["Unix/Linux-системы", "Сетевое монтирование удаленной файловой системы", "Только браузеры для HTTP/3", "Только почтовые серверы SMTP", "Только Bluetooth-устройства"], "a": [0, 1], "e": "NFS исторически связан с Unix/Linux-миром и сетевым доступом к файлам как к части файловой системы.", "globalIndex": 102, "tag": "06. NFS"}, {"l": "06. NFS", "q": "Как взаимодействуют ONC RPC, XDR и VFS в NFS?", "o": ["ONC RPC задает удаленные вызовы процедур между клиентом и сервером", "XDR задает переносимое представление данных между разными архитектурами", "VFS позволяет приложению работать с удаленной файловой системой через обычный файловый интерфейс ОС", "XDR выбирает ближайший CDN", "VFS является SMTP-командой"], "a": [0, 1, 2], "e": "NFS прячет удаленный доступ за файловым интерфейсом: VFS интегрирует ФС в ОС, RPC вызывает операции на сервере, XDR унифицирует формат данных.", "globalIndex": 103, "tag": "06. NFS"}, {"l": "06. NFS", "q": "Что гарантирует модель консистентности Close-to-Open в NFS?", "o": ["Изменения одного клиента становятся видимы другому после закрытия файла первым и открытия вторым", "Критичны операции close и последующий open", "Она не обещает мгновенную видимость каждого байта во время записи", "Она гарантирует абсолютную синхронность каждой операции write на всех клиентах", "Она используется только для SMTP-вложений"], "a": [0, 1, 2], "e": "Close-to-Open - практичный компромисс: после close/open клиенты должны увидеть согласованное состояние, но непрерывная строгая синхронность не обещается.", "globalIndex": 104, "tag": "06. NFS"}, {"l": "06. NFS", "q": "Что делает опция root_squash в экспорте NFS?", "o": ["Преобразует удаленного root-пользователя в непривилегированного пользователя на сервере", "Снижает риск того, что root на клиенте получит root-доступ к файлам сервера", "no_root_squash опасна, потому что сохраняет root-привилегии клиента на сервере", "root_squash ускоряет RTP-поток", "root_squash отменяет необходимость прав доступа Unix"], "a": [0, 1, 2], "e": "root_squash - важная защита NFS: root на клиентской машине не должен автоматически становиться root на серверном файловом хранилище.", "globalIndex": 105, "tag": "06. NFS"}]}, {"id": "m3", "title": "07. QoS", "notes": "\n<h3>Расширенный конспект: зачем QoS</h3>\n<p>В обычном IP-сетевом уровне действует принцип <b>best effort</b>: сеть старается доставить пакеты как может, но не обещает задержку, джиттер, потери или пропускную способность. Для FTP/HTTP это часто терпимо, а для VoIP/игр — критично.</p>\n<table><tr><th>Тип приложения</th><th>Что переносит плохо</th><th>Пример</th></tr>\n<tr><td>Elastic</td><td>Низкую скорость, но может подождать.</td><td>FTP, email, обычная загрузка.</td></tr>\n<tr><td>Потоковое</td><td>Сильные потери и нехватку полосы.</td><td>Видео, музыка.</td></tr>\n<tr><td>Интерактивное real-time</td><td>Задержку, джиттер, потери.</td><td>VoIP, игры, управление.</td></tr></table>\n<h3>Три принципа QoS</h3>\n<ol><li><b>Классификация:</b> нужно различать классы трафика, например VoIP и torrent.</li><li><b>Изоляция:</b> один класс не должен полностью вытеснить другой.</li><li><b>Эффективность:</b> канал не должен простаивать из-за слишком жёсткого резервирования.</li></ol>\n<h3>IntServ, RSVP, DiffServ, WFQ, Token Bucket</h3>\n<table><tr><th>Механизм</th><th>Суть</th></tr>\n<tr><td>IntServ/RSVP</td><td>Резервирование ресурсов для конкретного потока; RSVP передаёт параметры T-spec/R-spec по маршруту.</td></tr>\n<tr><td>DiffServ</td><td>Пакеты маркируются классом обслуживания; маршрутизаторы применяют Per-Hop Behavior.</td></tr>\n<tr><td>DSCP</td><td>6 бит в DS field IP-заголовка; не 8 бит. Оставшиеся 2 бита — ECN.</td></tr>\n<tr><td>EF</td><td>Expedited Forwarding: малые задержки/потери, подходит для голоса.</td></tr>\n<tr><td>WFQ</td><td>Взвешенная честная очередь: поток не остаётся совсем без полосы.</td></tr>\n<tr><td>Token Bucket</td><td>Маркеры накапливаются с заданной скоростью; пакет можно передать, если маркеров достаточно.</td></tr></table>\n<div class=\"exam\"><b>Ловушка:</b> DiffServ не резервирует ресурс для каждого соединения как IntServ; он работает с классами и поведением маршрутизаторов.</div>\n\n<hr>\n\n<h3>Что такое QoS</h3><p>QoS — качество обслуживания сети. В обычном интернете действует принцип <b>best effort</b>: сеть старается доставить пакеты, но ничего не гарантирует. QoS нужен, когда разным типам трафика нужны разные задержки, потери и полоса.</p>\n<table><tr><th>Тип приложения</th><th>Пример</th><th>Как переносит проблемы сети</th></tr>\n<tr><td>Elastic</td><td>FTP, HTTP, email, torrent</td><td>Может работать медленнее, но желательно без потерь</td></tr>\n<tr><td>Потоковое</td><td>Видео</td><td>Может снизить качество или увеличить буфер</td></tr>\n<tr><td>Реальное время</td><td>VoIP, игры</td><td>Плохо переносит задержки, джиттер и потери</td></tr></table>\n<h3>Принципы QoS</h3><ul><li>Нужно делить пакеты на классы и по-разному их обслуживать.</li><li>Приоритетный класс не должен полностью вытеснять остальные.</li><li>Нужно контролировать входящий трафик: policing/shaping.</li><li>Нужно эффективно использовать канал: если один класс не использует свою долю, её можно временно дать другому.</li></ul>\n<h3>Механизмы</h3><p><b>IntServ/RSVP</b> резервирует ресурсы для потока. <b>DiffServ</b> маркирует классы трафика и проще масштабируется. Очереди и планировщики: FIFO, priority queue, round robin, weighted fair queueing.</p>\n<div class=\"exam\"><b>Ловушка:</b> просто дать VoIP абсолютный приоритет нельзя: он может вытеснить весь остальной трафик.</div>\n", "questions": [{"l": "07. QoS", "q": "Канал 1.5 Mbps одновременно используют VoIP 1 Mbps и массовая загрузка. Какие выводы ближе всего к принципам QoS из лекции?", "o": ["Нужно классифицировать трафик и дать VoIP подходящую обработку", "Нельзя позволять одному классу вытеснить остальные ниже допустимой полосы", "Нужно эффективно использовать свободную часть канала", "Нужно всегда полностью запретить elastic-трафик", "Лучшее решение - навсегда выделить каждому типу фиксированную половину канала"], "a": [0, 1, 2], "e": "QoS требует классификации, изоляции классов и эффективного использования канала; жесткая статическая нарезка часто неэффективна.", "globalIndex": 106, "tag": "07. QoS"}, {"l": "07. QoS", "q": "Какие приложения из списка относятся к elastic по лекции?", "o": ["FTP", "Torrent", "Email", "HTTP-загрузка страницы", "IP-телефония"], "a": [0, 1, 2, 3], "e": "Elastic-приложения терпят широкий диапазон скоростей; IP-телефония относится к интерактивному real-time.", "globalIndex": 107, "tag": "07. QoS"}, {"l": "07. QoS", "q": "Чем потоковые приложения отличаются от интерактивных real-time с точки зрения QoS?", "o": ["Потоковые могут адаптировать качество или буфер", "Интерактивные хуже переносят задержки и потери", "Для интерактивных часто приходится использовать UDP", "Потоковые всегда требуют задержку меньше 1 мс", "Elastic и интерактивные приложения одинаково чувствительны к потерям"], "a": [0, 1, 2], "e": "Потоковые приложения могут снижать качество и буферизовать, а интерактивные ограничены малой задержкой.", "globalIndex": 108, "tag": "07. QoS"}, {"l": "07. QoS", "q": "Что означает best effort на сетевом уровне?", "o": ["Сеть старается доставить пакет по возможности быстро", "Нет гарантии задержки для конкретного пакета", "Нет гарантии вариации задержки в потоке", "Каждый поток получает заранее согласованную полосу", "Маршрутизаторы обязаны хранить состояние каждого приложения"], "a": [0, 1, 2], "e": "Best effort - максимум усилий без строгих гарантий задержки, потерь и джиттера.", "globalIndex": 109, "tag": "07. QoS"}, {"l": "07. QoS", "q": "Какая связка IntServ/RSVP описана верно?", "o": ["Приложение заранее запрашивает ресурсы", "RSVP переносит R-spec и T-spec по цепочке маршрутизаторов", "Маршрутизаторы резервируют itter и loss. Даже при высокой скорости большие задержки и jitter портят восприятие.", "globalIndex": 122, "tag": "07. QoS"}, {"l": "07. QoS", "q": "Что может сделать приложение, если сеть работает по best effort и иногда теряет пакеты?", "o": ["Использовать буферизацию", "Использовать адаптивный битрейт", "Использовать повторную передачу там, где задержка это позволяет", "Считать, что IP сам гарантирует доставку", "Запретить маршрутизаторам менять маршрут"], "a": [0, 1, 2], "e": "Приложения компенсируют best effort с помощью буферов, адаптации качества, FEC/повторов и контроля скорости.", "globalIndex": 123, "tag": "07. QoS"}, {"l": "07. QoS", "q": "В чем ключевое отличие IntServ и DiffServ?", "o": ["IntServ резервирует ресурсы для отдельных потоков", "IntServ использует RSVP для сигнализации резервирования", "DiffServ агрегирует трафик в классы и обрабатывает его по DSCP/PHB", "DiffServ требует хранить состояние каждого потока на каждом маршрутизаторе", "IntServ всегда масштабируется лучше DiffServ в ядре интернета"], "a": [0, 1, 2], "e": "IntServ дает более индивидуальные гарантии, но плохо масштабируется из-за состояния потоков. DiffServ проще масштабировать, потому что маршрутизаторы работают с классами.", "globalIndex": 124, "tag": "07. QoS"}]}, {"id": "m4", "title": "08. Программирование сетевых служб", "notes": "\n<h3>Расширенный конспект: TCP и UDP глазами программиста</h3>\n<p>Главная ловушка в сетевом программировании: <b>TCP — поток байтов</b>, а <b>UDP — датаграммы</b>. В TCP один <code>send</code> не обязан соответствовать одному <code>recv</code>: ОС может склеить или разделить данные. В UDP при нормальной доставке одна отправленная датаграмма читается одним <code>recvfrom</code>; если буфер меньше датаграммы, лишнее теряется.</p>\n<table><tr><th>Свойство</th><th>TCP</th><th>UDP</th></tr>\n<tr><td>Соединение</td><td>Есть, перед данными handshake.</td><td>Нет соединения.</td></tr>\n<tr><td>Единица</td><td>Поток байтов.</td><td>Отдельная датаграмма.</td></tr>\n<tr><td>Порядок/повторы</td><td>ОС восстанавливает.</td><td>Приложение само решает.</td></tr>\n<tr><td>Маленький буфер recv</td><td>Остаток прочитается потом.</td><td>Остаток датаграммы отбрасывается.</td></tr></table>\n<h3>Типовой TCP-сервер</h3>\n<ol><li><code>socket()</code> — создать сокет.</li><li><code>bind()</code> — привязать адрес и порт.</li><li><code>listen()</code> — начать слушать входящие подключения.</li><li><code>accept()</code> — принять клиента и получить отдельный сокет клиента.</li><li><code>recv()/send()</code> — читать и писать данные.</li></ol>\n<p>После <code>accept</code> ОС уже принимает подключение, но данные от конкретного клиента читаются через сокет, возвращённый <code>accept</code>. У TCP-сервера много сокетов клиентов, у UDP-сервера часто один сокет на всех.</p>\n<h3>Calculation 1.0 и разделитель \\r\\n</h3>\n<p>Разделитель <code>\\r\\n</code> нужен, чтобы понять границу сообщения в TCP-потоке. Без разделителя сервер не знает, где закончился запрос, потому что TCP не сохраняет границы отдельных <code>send</code>. Это не «стандарт CGI», а практический способ фрейминга.</p>\n<h3>poll и epoll</h3>\n<p><code>poll</code> требует каждый раз обходить список дескрипторов для проверки событий. <code>epoll</code> эффективнее для большого числа соединений: ядро сообщает о готовых событиях, не заставляя приложение линейно проверять всё.</p>\n<div class=\"exam\"><b>Правило:</b> TCP можно читать по 1 байту ради поиска конца строки; для UDP буфер 1 байт фатален для больших датаграмм.</div>\n\n<hr>\n\n<h3>Клиент-сервер и протокол</h3><p>Сетевая служба обычно строится как сервер, который ждёт запросы, и клиенты, которые подключаются и отправляют команды. Протокол — это договорённость о формате запросов и ответов.</p>\n<p>Пример: <code>CALC * 12 6\r\n</code> → <code>OK 72\r\n</code> или <code>ERR\r\n</code>.</p>\n<h3>TCP или UDP</h3><table><tr><th>TCP</th><th>UDP</th></tr>\n<tr><td>Надёжный поток байтов, порядок, повторная передача, контроль скорости</td><td>Датаграммы без гарантии доставки и порядка</td></tr>\n<tr><td>Может склеивать и делить данные: один send ≠ один recv</td><td>Одна отправленная датаграмма читается как отдельное сообщение</td></tr>\n<tr><td>Есть установка соединения, больше задержка</td><td>Нет соединения, меньше накладные расходы</td></tr></table>\n<h3>Главная ошибка новичков в TCP</h3><p>TCP — поток байтов. Нельзя думать, что один <code>send()</code> у клиента обязательно станет одним <code>recv()</code> у сервера. Поэтому нужен разделитель сообщений, например <code>\r\n</code>, длина сообщения или фиксированный формат.</p>\n<h3>Многоклиентский сервер</h3><p>Сервер может обслуживать клиентов через процессы, потоки, неблокирующие сокеты или event loop. Нужно не блокировать весь сервер ожиданием одного медленного клиента.</p>\n", "questions": [{"l": "08. Программирование сетевых служб", "q": "Клиент отправил `CALC * 12 6\\r\\n`, но сервер получил сначала `CALC * 1`, потом `2 6\\r\\n`. Что это демонстрирует?", "o": ["TCP является потоком байтов и может делить данные иначе, чем send()", "UDP гарантированно склеивает все пакеты", "Сервер должен искать границу запроса, например \\r\\n", "TCP потерял пакет без возможности восстановления", "Telnet всегда шифрует ввод"], "a": [0, 2], "e": "В TCP нельзя считать, что один send соответствует одному recv; нужен протокол фрейминга.", "globalIndex": 125, "tag": "08. Программирование сетевых служб"}, {"l": "08. Программирование сетевых служб", "q": "Какие свойства TCP помогают простому серверу с несколькими клиентами?", "o": ["ОС создает отдельный сокет для принятого соединения", "TCP восстанавливает порядок данных", "TCP обеспечивает надежную доставку байтов", "TCP сохраняет границы сообщений приложения", "TCP не требует установления соединения"], "a": [0, 1, 2], "e": "TCP надежен и соединение-ориентирован, но границы сообщений приложения он не сохраняет.", "globalIndex": 126, "tag": "08. Программирование сетевых служб"}, {"l": "08. Программировани е сетевых служб"}, {"l": "08. Программирование сетевых служб", "q": "Почему UDP-сервер вместо accept/recv использует recvfrom?", "o": ["UDP не устанавливает соединение перед обменом", "recvfrom возвращает данные и адрес отправителя", "UDP-серверу важно знать, куда отправлять ответ через sendto", "accept обязателен для каждого UDP-пакета", "listen в UDP создает очередь TCP-подключений"], "a": [0, 1, 2], "e": "В UDP нет TCP-подключения и отдельного сокета на клиента. Поэтому адрес клиента приходит вместе с датаграммой в recvfrom.", "globalIndex": 145, "tag": "08. Программирование сетевых служб"}, {"l": "08. Программирование сетевых служб", "q": "Как различать клиентов на UDP-сервере?", "o": ["По паре IP-адрес + порт отправителя", "Если клиенты за одним NAT, внешний порт помогает их различить", "Только по имени пользователя в DNS", "По номеру TCP-соединения, который вернул accept", "UDP не позволяет различать клиентов вообще"], "a": [0, 1], "e": "Для UDP источник датаграммы задается парой адреса и порта. За NAT несколько клиентов могут иметь один внешний IP, но разные внешние порты.", "globalIndex": 146, "tag": "08. Программирование сетевых служб"}, {"l": "08. Программирование сетевых служб", "q": "UDP-клиент не вызывает connect. Когда ему может быть назначен локальный порт?", "o": ["Операционной системой при первой отправке sendto", "При явном bind, если приложение само хочет выбрать порт", "Корневым DNS-сервером", "Функцией listen", "Алгоритмом Base64"], "a": [0, 1], "e": "UDP-клиент может не вызывать connect: ОС назначит ephemeral port при первой отправке. Если нужен конкретный порт, приложение вызывает bind.", "globalIndex": 147, "tag": "08. Программирование сетевых служб"}, {"l": "08. Программирование сетевых служб", "q": "На какой функции UDP-сервер обычно ждет запроса клиента?", "o": ["recvfrom", "accept", "listen", "connect", "gethostbyname"], "a": [0], "e": "UDP-сервер получает датаграммы через recvfrom, потому что соединение заранее не устанавливается.", "glo
