орта?", "o": ["Чтобы перевести число из порядка байтов хоста в сетевой порядок", "Чтобы корректно записать 16-битный номер порта в sockaddr_in", "Чтобы преобразовать доменное имя в IP-адрес", "Чтобы открыть TCP-соединение", "Чтобы сжать данные в Base64"], "a": [0, 1], "e": "Сетевые протоколы используют network byte order. htons нужна, чтобы 16-битный порт был записан в правильном порядке байтов.", "globalIndex": 152, "tag": "08. Программирование сетевых служб"}, {"l": "08. Программирование сетевых служб", "q": "Почему вставка sleep между send и recv обычно плохое решение?", "o": ["Время ответа сервера заранее неизвестно", "Клиент либо ждет слишком долго, либо все равно может не дождаться полного ответа", "Это не решает задачу определения конца сообщения", "sleep автоматически включает конвейеризацию протокола", "sleep превращает TCP в надежный UDP"], "a": [0, 1, 2], "e": "sleep не является протокольным механизмом синхронизации. Надежнее явно описать формат сообщения, читать до разделителя/длины и обрабатывать готовность данных.", "globalIndex": 153, "tag": "08. Программирование сетевых служб"}, {"l": "08. Программирование сетевых служб", "q": "В 2 байтах без знака можно закодировать 65536 разных значений. Какой максимальный размер можно записать, если длина хранится как unsigned 16-bit?", "o": ["65535", "65536", "256", "32767", "2"], "a": [0], "e": "2 байта = 16 бит = 2^16 комбинаций. Если значения идут от 0, максимальное беззнаковое значение равно 65535.", "globalIndex": 154, "tag": "08. Программирование сетевых служб"}, {"l": "08. Программирование сетевых служб", "q": "В вызове `listen(ListenSocket, 50)` что означает параметр 50?", "o": ["Размер очереди ожидающих входящих TCP-подключений", "Максимально допустимый backlog, который ОС может дополнительно ограничить", "Количество байт, которое recv прочитает за один вызов", "Порт сервера", "Число UDP-пакетов, которое accept вернет за раз"], "a": [0, 1], "e": "Второй параметр listen задает backlog - очередь подключений, ожидающих accept. Реальное значение может ограничиваться ОС.", "globalIndex": 155, "tag": "08. Программирование сетевых служб"}]}, {"id": "m5", "title": "09. Сетевая безопасность", "notes": "\n<h3>Расширенный конспект: цели безопасности</h3>\n<table><tr><th>Цель</th><th>Что означает</th><th>Пример проверки</th></tr>\n<tr><td>Конфиденциальность</td><td>Посторонний не читает данные.</td><td>TLS/SSH шифрует трафик.</td></tr>\n<tr><td>Целостность</td><td>Данные нельзя незаметно изменить.</td><td>MAC/подпись/хеш с ключом.</td></tr>\n<tr><td>Аутентификация</td><td>Проверка подлинности субъекта.</td><td>Пароль, сертификат, Kerberos.</td></tr>\n<tr><td>Авторизация</td><td>Проверка прав после входа.</td><td>Роль admin/user.</td></tr>\n<tr><td>Доступность</td><td>Сервис работает несмотря на атаки.</td><td>Защита от DDoS.</td></tr></table>\n<h3>Нарушители</h3>\n<p><b>Внешние</b>: script kiddies, киберпреступники, хактивисты. <b>Внутренние</b>: обиженные сотрудники, «засланные казачки», небрежные пользователи. Небрежные пользователи не имеют злого умысла, но их действия всё равно могут быть наказуемы и опасны.</p>\n<h3>TLS, сертификаты и ЭЦП</h3>\n<p>Сертификат связывает <b>открытый ключ</b> владельца с данными владельца и подписан центром сертификации. Закрытый ключ владельца в сертификат не входит. При проверке цепочки клиент идёт от сертификата сервера через промежуточные CA к доверенному корневому CA. Подпись проверяется открытым ключом следующего сертификата/CA.</p>\n<p>ЭЦП обычно создаётся не над всем файлом напрямую, а над <b>хешем данных</b>, который подписывается закрытым ключом отправителя. Проверка выполняется открытым ключом.</p>\n<h3>XSS, CSRF, DNS hijacking, ARP spoofing</h3>\n<ul><li><b>XSS</b>: внедрение JS/HTML в страницу. Защита: экранирование вывода, CSP, HttpOnly для cookie.</li><li><b>CSRF</b>: браузер жертвы автоматически отправляет запрос от имени пользователя. Может усиливать пассивный XSS через тег <code>&lt;img&gt;</code> с вредным URL.</li><li><b>DNS hijacking</b>: подмена DNS-настроек/ответов, чтобы жертва получила ложный IP сайта.</li><li><b>ARP spoofing</b>: злоумышленник рассылает ARP-ответы, связывая свой MAC с IP шлюза.</li></ul>\n<div class=\"exam\"><b>Пароли:</b> хранить надо не пароль, а медленный salted hash. Хеш без соли уязвим к радужным таблицам и массовому перебору после утечки БД.</div>\n\n<hr>\n\n<h3>Основные свойства безопасности</h3><table><tr><th>Свойство</th><th>Смысл</th></tr>\n<tr><td>Конфиденциальность</td><td>Посторонние не читают данные</td></tr>\n<tr><td>Целостность</td><td>Данные нельзя незаметно изменить</td></tr>\n<tr><td>Аутентификация</td><td>Проверка личности или подлинности сервера</td></tr>\n<tr><td>Авторизация</td><td>Проверка прав доступа</td></tr>\n<tr><td>Доступность</td><td>Сервис остаётся работоспособным</td></tr></table>\n<h3>Криптография</h3><ul><li><b>Симметричное шифрование</b> быстрое, один общий секретный ключ.</li><li><b>Асимметричное шифрование</b> использует пару открытый/закрытый ключ; удобно для обмена ключами и подписей.</li><li><b>Хэш</b> даёт отпечаток данных; по нему нельзя восстановить исходные данные.</li><li><b>MAC/HMAC</b> подтверждает целостность и знание общего секрета.</li><li><b>Цифровая подпись</b> подтверждает автора и целостность через закрытый ключ автора.</li></ul>\n<h3>Типовые угрозы</h3><p>Сниффинг, подмена, Man-in-the-Middle, фишинг, вредоносное ПО, DoS/DDoS, слабые пароли, инсайдеры. Защита: шифрование, сертификаты, многофакторная аутентификация, фильтрация, обновления, разделение прав.</p>\n<div class=\"exam\"><b>Ловушка:</b> аутентификация — «кто ты?», авторизация — «что тебе разрешено?».</div>\n", "questions": [{"l": "09. Сетевая безопасность", "q": "Внутренний сотрудник случайно открывает вредоносную ссылку из письма. Как это лучше классифицировать по лекции?", "o": ["Внутренний нарушитель", "Небрежный пользователь без злого умысла", "Ситуация, которая все равно может привести к компрометации сети", "Хактивист", "DDoS через IP-спуфинг"], "a": [0, 1, 2], "e": "Инсайдер может быть опасен даже без умысла: халатность и слабые пароли приводят к компрометации.", "globalIndex": 156, "tag": "09. Сетевая безопасность"}, {"l": "09. Сетевая безопасность", "q": "В онлайн-банкинге пользователь должен быть уверен, что переводит деньги нужному адресату. Какая составляющая безопасности здесь ближе всего?", "o": ["Целостность и подлинность операции", "Только доступность сервера", "Только скорость QoS", "MIME-кодирование"], "a": [0], "e": "Нужны подлинность участников и неизменность смысла операции: кому и сколько переводится.", "globalIndex": 157, "tag": "09. Сетевая безопасность"}, {"l": "09. Сетевая безопасность", "q": "Какие утверждения о WPA2 с общим паролем соответствуют лекции?", "o": ["Участники одной сети могут перехватывать трафик друг друга", "WPA3 является вариантом защиты от этой проблемы", "WPA2-Enterprise с RADIUS также является вариантом защиты", "Общий пароль WPA2 равен полной защите от всех соседей по сети", "Wireshark не может использоваться для анализа трафика"], "a": [0, 1, 2], "e": "Общий пароль не равен индивидуальной аутентификации; WPA3 и WPA2-Enterprise улучшают ситуацию.", "globalIndex": 158, "tag": "09. Сетевая безопасность"}, {"l": "09. Сетевая безопасность", "q": "При отраженной DDoS-атаке с IP-спуфингом какие элементы обязательны?", "o": ["Поддельный IP-адрес источника, равный адресу жертвы", "Открытый сервер-усилитель, отвечающий большим объемом данных", "Ответы приходят жертве", "Жертва должна сама установить TCP-соединение с атакующим", "Kerberos TGT должен быть украден"], "a": [0, 1, 2], "e": "Суть отражения: атакующий подставляет жертву как источник, а третьи серверы отвечают ей.", "globalIndex": 159, "tag": "09. Сетевая безопасность"}, {"l": "09. Сетевая безопасность", "q": "Какие протоколы/сценарии из лекции опасны при передаче пароля без TLS/HTTPS?", "o": ["HTTP-аутентификация без HTTPS", "Почтовые протоколы без TLS", "Аутентификация на прокси без защиты", "SSH", "SFTP"], "a": [0, 1, 2], "e": "SSH/SFTP шифруют канал, а перечисленные незащищенные схемы могут передавать пароль перехватываемо.", "globalIndex": 160, "tag": "09. Сетевая безопасность"}, {"l": "09. Сетевая безопасность", "q": "Почему простой хеш пароля без соли недостаточен?", "o": ["Одинаковые пароли дают одинаковые хеши", "Можно использовать заранее рассчитанные радужные таблицы", "Утечка базы облегчает восстановление популярных паролей", "Хеш без соли всегда хранит пароль в открытом виде", "Соль нужна только для ускорения SQL"], "a": [0, 1, 2], "e": "Соль делает массовые предрасчеты и сравнение одинаковых паролей намного менее полезными.", "globalIndex": 161, "tag": "09. Сетевая безопасность"}, {"l": "09. Сетевая безопасность", "q": "Почему «секретная» ссылка на админку не заменяет аутентификацию?", "o": ["Популярные скрытые адреса легко угадываются", "URL может быть проиндексирован или утечь", "При отсутствии проверки прав доступ остается несанкционированным", "HTTP гарантирует невозможность перебора URL", "Скрытый URL автоматически включает MFA"], "a": [0, 1, 2], "e": "Секретность адреса - слабый барьер; нужна настоящая аутентификация и авторизация.", "globalIndex": 162, "tag": "09. Сетевая безопасность"}, {"l": "09. Сетевая безопасность", "q": "Какие действия возможны при Man-in-the-Middle, согласно лекции?", "o": ["Просмотр конфиденциальной информации", "Незаметное изменение передаваемых данных", "Создание иллюзии прямого общения у обеих сторон", "Автоматическое получение физического доступа к серверу", "Гарантированное повышение QoS"], "a": [0, 1, 2], "e": "MitM встроен между сторонами и может читать/изменять обмен, если нет надежной защиты канала и проверки подлинности.", "globalIndex": 163, "tag": "09. Сетевая безопасность"}, {"l": "09. Сетевая безопасность", "q": "Что делает ARP-spoofing эффективным именно в локальной сети?", "o": ["Узлы полагаются на ARP-соответствие IP -> MAC", "Поддельные ARP-ответы могут отравить ARP-кэш", "Трафик начинает идти через MAC атакующего", "ARP работает только через Kerberos", "ARP-запросы всегда подписаны удостоверяющим центром"], "a": [0, 1, 2], "e": "ARP не имеет встроенной строгой проверки подлинности ответов, что позволяет отравлять кэш в LAN.", "globalIndex": 164, "tag": "09. Сетевая безопасность"}, {"l": "09. Сетевая безопасность", "q": "Чем DNS hijacking отличается от ARP-spoofing?", "o": ["DNS hijacking подменяет разрешение имени в IP-адрес", "ARP-spoofing подменяет соответствие IP и MAC в локальной сети", "Обе атаки могут вести к перенаправлению пользователя", "DNS hijacking всегда требует физического доступа к кабелю", "ARP-spoofing меняет MX-записи домена в глобальном DNS"], "a": [0, 1, 2], "e": "Обе атаки перенаправляют трафик, но действуют на разных механизмах: DNS-имена и локальное IP->MAC.", "globalIndex": 165, "tag": "09. Сетевая безопасность"}, {"l": "09. Сетевая безопасность", "q": "В интернет-магазине цена товара считается JavaScript-кодом в браузере и отправляется серверу. В чем ошибка архитектуры?", "o": ["Клиентский код можно изменить", "Сервер обязан перепроверять цену и сумму заказа", "Браузерные инструменты отладки позволяют менять данные и запросы", "JavaScript нельзя использовать вообще ни при каких условиях", "Проблема решается только переименованием админки"], "a": [0, 1, 2], "e": "Проблема не в самом JavaScript, а в доверии к данным, пришедшим от клиента.", "globalIndex": 166, "tag": "09. Сетевая безопасность"}, {"l": "09. Сетевая безопасность", "q": "Какие утверждения про XSS верны?", "o": ["Атакующий размещает JavaScript на сайте-жертве или добивается его исполнения в контексте сайта", "Скрипт может украсть данные, доступные браузеру, например идентификатор сессии", "HttpOnly снижает риск кражи cookie через JavaScript", "XSS невозможен, если сайт использует HTML", "XSS - это только подмена IP-адреса отправителя"], "a": [0, 1, 2], "e": "XSS связан с выполнением вредоносного скрипта в контексте доверенного сайта.", "globalIndex": 167, "tag": "09. Сетевая безопасно ого вируса?", "o": ["Червь способен распространяться по сети, используя уязвимости или слабые настройки", "Вирус часто внедряется в файл или программу-носитель", "Червю обязательно нужен пользовательский запуск каждого зараженного файла вручную", "Вирусы не могут иметь вредоносной нагрузки", "Черви существуют только в DNS-записях"], "a": [0, 1], "e": "Вирус обычно привязан к носителю/файлу, а червь делает акцент на самостоятельном сетевом распространении.", "globalIndex": 179, "tag": "09. Сетевая безопасность"}, {"l": "09. Сетевая безопасность", "q": "Что такое spoofing в сетевой безопасности?", "o": ["Подмена адреса, имени или другого идентификатора", "Создание пакетов, которые выглядят как пришедшие от другого источника", "Синоним любого шифрования", "Обязательная часть TCP-handshake", "Формат сжатия изображений"], "a": [0, 1], "e": "Spoofing — это подделка идентичности: IP, DNS, email sender, MAC и т.п. Сам по себе он не является шифрованием.", "globalIndex": 180, "tag": "09. Сетевая безопасность"}, {"l": "09. Сетевая безопасность", "q": "В чем суть DNS hijacking?", "o": ["Пользователю подсовывают неверный DNS-ответ или меняют путь разрешения имени", "Жертва может попасть на подставной IP вместо настоящего сервиса", "Это всегда легальная балансировка нагрузки CDN", "Это обязательно требует физической замены сетевой карты", "Это то же самое, что Base64"], "a": [0, 1], "e": "DNS hijacking опасен тем, что имя остается привычным, а IP может указывать на контролируемый злоумышленником ресурс.", "globalIndex": 181, "tag": "09. Сетевая безопасность"}, {"l": "09. Сетевая безопасность", "q": "Какие утверждения про DNS-spoofing и отравление кэша верны?", "o": ["Атакующий пытается заставить resolver поверить поддельному ответу", "Если поддельная запись попала в кэш, ошибка может влиять на последующие запросы", "Рандомизация ID запроса и порта усложняет атаку", "DNS-spoofing невозможен, потому что DNS всегда использует SSH", "TTL записи никак не влияет на длительность эффекта кэша"], "a": [0, 1, 2], "e": "Отравление кэша опасно повторным использованием ложной записи. Случайные ID/порт и DNSSEC снижают риск.", "globalIndex": 182, "tag": "09. Сетевая безопасность"}, {"l": "09. Сетевая безопасность", "q": "Что отличает отраженную DDoS-атаку от обычной прямой отправки трафика на жертву?", "o": ["Трафик к жертве генерируют сторонние серверы-отражатели", "Атакующий может подменять адрес источника на адрес жертвы", "Ответы отражателей приходят жертве", "В отраженной атаке всегда участвует только один пакет", "Отраженная атака невозможна с UDP-сервисами"], "a": [0, 1, 2], "e": "Отражение использует третьи серверы: запрос выглядит как пришедший от жертвы, и ответы летят к ней. UDP-сервисы особенно удобны для таких схем.", "globalIndex": 183, "tag": "09. Сетевая безопасность"}, {"l": "09. Сетевая безопасность", "q": "Что такое X.509-сертификат в контексте TLS/HTTPS?", "o": ["Документ, связывающий публичный ключ с именем субъекта", "Сертификат подписывается центром сертификации или другим доверенным ключом", "Он помогает клиенту проверить, что сервер владеет соответствующим приватным ключом", "Это пароль пользователя в открытом виде", "Это DNS-запись типа MX"], "a": [0, 1, 2], "e": "X.509-сертификат содержит публичный ключ и идентичность, а доверие строится через подписи и цепочку сертификации.", "globalIndex": 184, "tag": "09. Сетевая безопасность"}, {"l": "09. Сетевая безопасность", "q": "Какие признаки делают TLS-соединение недоверенным или подозрительным?", "o": ["Имя сайта не совпадает с именем в сертификате", "Сертификат просрочен", "Цепочка сертификатов не ведет к доверенному CA", "Сертификат использует публичный ключ", "Сервер использует порт 443"], "a": [0, 1, 2], "e": "Публичный ключ и порт 443 сами по себе нормальны. Проблемы — несоответствие имени, срок действия и недоверенная цепочка.", "globalIndex": 185, "tag": "09. Сетевая безопасность"}, {"l": "09. Сетевая безопасность", "q": "Какие меры помогают уменьшить риск IP-spoofing и отраженных атак?", "o": ["Фильтрация исходящего трафика с поддельными source IP на границе сети", "BCP38/ingress-egress filtering", "Ограничение открытых UDP-сервисов-усилителей", "Публикация приватного SSH-ключа", "Отключение всех MAC-адресов"], "a": [0, 1, 2], "e": "Фильтрация поддельных исходных адресов и контроль UDP-сервисов уменьшают возможности для reflection/amplification DDoS.", "globalIndex": 186, "tag": "09. Сетевая безопасность"}]}, {"id": "m6", "title": "10. LDAP и Kerberos", "notes": "\n<h3>Расширенный конспект: зачем LDAP/Kerberos/AD</h3>\n<p>В большой организации нельзя держать отдельную базу пользователей в каждом сервисе: это плохо для безопасности и администрирования. Нужна единая база пользователей, групп и политик, а также единый механизм входа.</p>\n<table><tr><th>Технология</th><th>Роль</th></tr>\n<tr><td>LDAP</td><td>Протокол доступа к каталогу: пользователи, группы, атрибуты, DN.</td></tr>\n<tr><td>Kerberos</td><td>Сетевой протокол аутентификации по билетам.</td></tr>\n<tr><td>Active Directory</td><td>Комплексное решение Microsoft: LDAP + Kerberos + DNS + политики/домены.</td></tr></table>\n<h3>LDAP</h3>\n<p>LDAP-данные хранятся как дерево DIT. Запись имеет DN — уникальный путь в дереве. LDAP можно использовать для поиска атрибутов и групп, а также для простой проверки пароля через bind. Но один LDAP без Kerberos обычно не даёт полноценный SSO: пользователь вводит пароль сервису, а не получает билет для разных служб.</p>\n<h3>Kerberos: AS, TGS, Service Ticket</h3>\n<ol><li>Пользователь проходит первичную аутентификацию и получает <b>TGT</b> — билет для Ticket Granting Service.</li><li>Когда нужен конкретный сервис, клиент предъявляет TGT серверу <b>TGS</b>.</li><li><b>TGS</b> выдаёт сервисный билет для доступа к конкретному ресурсу.</li><li>Клиент предъявляет сервисный билет файловому/почтовому/другому серверу.</li></ol>\n<p>Kerberos требует синхронизации времени: билеты имеют срок действия, а рассинхронизация ломает проверку. Для глобального Интернета Kerberos неудобен из-за зависимости от домена, KDC, времени, смены сетевого окружения и сложности междоменных доверий.</p>\n<div class=\"exam\"><b>Запомни:</b> TGS не проверяет пароль при каждом сервисе; он выдаёт сервисные билеты на основе уже полученного TGT.</div>\n\n<hr>\n\n<h3>Зачем нужны LDAP и Kerberos</h3><p>В компании неудобно хранить отдельные логины и пароли в каждом сервисе. Нужны единый каталог пользователей и единая проверка входа.</p>\n<table><tr><th>Технология</th><th>Роль</th></tr>\n<tr><td>LDAP</td><td>Протокол доступа к службе каталогов: пользователи, группы, отделы, email, права</td></tr>\n<tr><td>DN</td><td>Уникальное имя записи в дереве LDAP, путь к объекту</td></tr>\n<tr><td>DIT</td><td>Иерархическое дерево каталога</td></tr>\n<tr><td>Kerberos</td><td>Протокол аутентификации через билеты, основа SSO</td></tr></table>\n<h3>Kerberos кратко</h3><p>Пользователь один раз доказывает пароль серверу аутентификации и получает билет. Потом для доступа к сервисам предъявляет билеты, а пароль не передаётся каждому сервису.</p>\n<ul><li><b>KDC</b> — центр выдачи билетов.</li><li><b>AS</b> — Authentication Server, выдаёт TGT.</li><li><b>TGS</b> — Ticket Granting Server, выдаёт билет к конкретному сервису.</li><li><b>TGT</b> — билет для получения других билетов.</li></ul>\n<h3>SSO</h3><p>Single Sign-On означает, что пользователь входит один раз и затем получает доступ к нескольким сервисам без повторного ввода пароля.</p>\n", "questions": [{"l": "10. LDAP и Kerberos", "q": "В компании 20 сервисов, и сотрудник увольняется. Почему централизованный каталог лучше отдельных учеток в каждом сервисе?", "o": ["Доступ можно отключить централизованно", "Меньше риск забыть удалить учетную запись в одном из сервисов", "Проще управлять группами и правами", "Каждый сервис обязан хранить свой пароль в открытом виде", "LDAP автоматически шифрует весь сетевой трафик"], "a": [0, 1, 2], "e": "Централизация снижает административные ошибки и упрощает жизненный цикл учетных записей.", "globalIndex": 187, "tag": "10. LDAP и Kerberos"}, {"l": "10. LDAP и Kerberos", "q": "Чем LDAP-каталог отличается от обычной SQL-таблицы в контексте лекции?", "o": ["Данные организованы как иерархическое дерево DIT", "Каталог удобен для пользователей, групп и организационных единиц", "LDAP вообще не может хранить группы", "LDAP является протоколом передачи видео", "SQL всегда заменяет Kerberos"], "a": [0, 1], "e": "LDAP ориентирован на иерархический каталог, а не на произвольные реляционные запросы.", "globalIndex": 188, "tag": "10. LDAP и Kerberos"}, {"l": "10. LDAP и Kerberos", "q": "Почему LDAP bind без Kerberos не является полноценной заменой Kerberos в корпоративной аутентификации?", "o": ["LDAP bind проверяет учетные данные, но не дает инфраструктуру билетов", "Kerberos снижает необходимость многократно передавать пароль сервисам", "Kerberos использует временные метки и билеты", "LDAP не может вообще использоваться для аутентификации", "Kerberos нужен только для FTP"], "a": [0, 1, 2], "e": "LDAP может проверить пароль, но Kerberos строит SSO через билеты и симметричные ключи.", "globalIndex": 189, "tag": "10. LDAP и Kerberos"}, {"l": "10. LDAP и Kerberos", "q": "Какая последовательность Kerberos ближе всего к лекции?", "o": ["Пользователь -> AS за TGT -> TGS за service ticket -> сервис", "Пользователь -> MX -> POP3 -> сервис", "Клиент -> Resource Server -> Authorization Server -> TGT", "Пользователь -> RTSP PLAY -> LDAP bind -> RTP"], "a": [0], "e": "AS выдает TGT, затем TGS по TGT выдает билет конкретному сервису.", "globalIndex": 190, "tag": "10. LDAP и Kerberos"}, {"l": "10. LDAP и Kerberos", "q": "Какие утверждения о TGT и service ticket верны?", "o": ["TGT доказывает, что пользователь уже прошел первичную аутентификацию", "Service ticket предназначен для конкретного сервиса", "TGT отправляется TGS для получения сервисного билета", "Service ticket является OAuth Access Token", "TGT нужен для выбора DNS MX"], "a": [0, 1, 2], "e": "TGT - билет для получения других билетов; service ticket предъявляется конкретному серверу.", "globalIndex": 191, "tag": "10. LDAP и Kerberos"}, {"l": "10. LDAP и Kerberos", "q": "Какие роли обычно выполняет Domain Controller в Active Directory?", "o": ["KDC для Kerberos", "LDAP-сервер", "Источник групповых политик GPO", "RTCP Receiver Report", "SMTP-клиент пользователя"], "a": [0, 1, 2], "e": "Контроллер домена совмещает аутентификацию Kerberos, каталог LDAP и управление политиками.", "globalIndex": 192, "tag": "10. LDAP и Kerberos"}, {"l": "10. LDAP и Kerberos", "q": "Почему Kerberos плохо подходит как основной протокол для глобального интернета?", "o": ["Требует строгой синхронизации времени", "Неудобен при смене IP клиентов и мобильности", "Не рассчитан на типичные интернет-угрозы вроде brute-force/DDoS в такой роли", "Не работает внутри корпоративной сети", "Не умеет выдавать билеты"], "a": [0, 1, 2], "e": "Kerberos хорош в контролируемой корпоративной сети, но для интернета обычно используют SAML/OIDC/OAuth.", "globalIndex": 193, "tag": "10. LDAP и Kerberos"}, {"l": "10. LDAP и Kerberos", "q": "Какая современная архитектура мостит корпоративный Kerberos и облачные приложения?", "o": ["AD внутри компании плюс ADFS/Keycloak на границе", "Преобразование Kerberos-аутентификации в SAML/OIDC", "Использование OAuth2 для авторизационных сценариев", "Полный отказ от LDAP-групп внутри компании", "Передача TGT напрямую каждому внешнему сайту"], "a": [0, 1, 2], "e": "Пограничный IdP переводит внутреннюю аутентификацию в федеративные веб-протоколы.", "globalIndex": 194, "tag": "10. LDAP и Kerberos"}, {"l": "10. LDAP и Kerberos", "q": "Что такое Pass-the-Ticket?", "o": ["Использование похищенного TGT или service ticket для доступа от имени пользователя", "Подбор пароля LDAP по словарю", "Подмена DSCP-кода", "Пересылка письма через SMTP"], "a": [0], "e": "Если атакующий извлек билет из памяти, он может предъявлять его без знания пароля пользователя.", "globalIndex": 195, "tag": "10. LDAP и Kerberos"}, {"l": "10. LDAP и Kerberos", "q": "Почему Golden Ticket опаснее обычной кражи одного сервисного билета?", "o": ["Он связан с компрометацией ключа krbtgt", "Атакующий может сам выпускать TGT с произвольными правами", "Это фактически дает контроль над доменом", "Golden Ticket работает только для одного файла NFS", "Golden Ticket является типом OAuth refresh token"], "a": [0, 1, 2], "e": "Компрометация krbtgt позволяет подделывать билеты на уровне домена, что существенно опаснее одного украденного билета.", "globalIndex": 196, "tag": "10. LDAP и Kerberos"}, {"l": "10. LDAP и Kerberos", "q": "Чем аутентификация отличается от авторизации?", "o": ["Аутентификация отвечает на вопрос 'кто ты?'", "Авторизация отвечает на вопрос 'что тебе разрешено?'", "Обычно сначала выполняется аутентификация, затем проверка прав", "Авторизация всегда заменяет пароль на Base64", "Аутентификация означает только выдачу прав администратора"], "a": [0, 1, 2], "e": "Сначала система устанавливает личность пользователя, затем решает, к каким ресурсам и действиям у него есть доступ.", "globalIndex": 197, "tag": "10. LDAP и Kerberos"}, {"l": "10. LDAP и Kerberos", "q": "Что означает SSO?", "o": ["Single Sign-On", "Возможность один раз пройти вход и использовать несколько сервисов без повторного ввода пароля", "Secure Socket Output", "Simple SMTP Object", "Обязательное хранение паролей во всех приложениях"], "a": [0, 1], "e": "SSO снижает число повторных логинов: пользователь аутентифицируется в одном доверенном месте, а сервисы принимают результат.", "globalIndex": 198, "tag": "10. LDAP и Kerberos"}, {"l": "10. LDAP и Kerberos", "q": "Что ближе всего к назначению LDAP?", "o": ["Доступ к каталоговой службе с пользователями, группами и атрибутами", "Поиск учетных записей и организационных объектов в дереве каталога", "Передача видеопотока с RTP timestamp", "Замена IP-маршрутизации", "Шифрование каждого Ethernet-кадра"], "a": [0, 1], "e": "LDAP — протокол доступа к каталогам. Он хорошо подходит для хранения и поиска учетных записей, групп и атрибутов.", "globalIndex": 199, "tag": "10. LDAP и Kerberos"}, {"l": "10. LDAP и Kerberos", "q": "Какие утверждения про Kerberos верны?", "o": ["Kerberos использует билеты", "KDC является доверенным центром в схеме", "После получения билета сервис может проверять пользователя без передачи пароля самому сервису", "Kerberos всегда работает только через SMTP", "Kerberos не зависит от времени вообще"], "a": [0, 1, 2], "e": "Kerberos строится на билетах и доверии к KDC. Время важно, потому что билеты имеют срок действия и защищены от повторного использования.", "globalIndex": 200, "tag": "10. LDAP и Kerberos"}, {"l": "10. LDAP и Kerberos", "q": "Почему сервисам при SSO не стоит хранить пользовательские пароли у себя?", "o": ["Это увеличивает риск компрометации паролей", "Лучше доверять результату аутентификации от выделенного провайдера", "Пароль не нужен каждому сервису для проверки уже выданного токена/билета", "Потому что пароли можно хранить только в DNS", "Потому что SSO запрещает любые права доступа"], "a": [0, 1, 2], "e": "SSO выносит аутентификацию в доверенный компонент. Сервисы получают утверждение/токен/билет и не должны копить пароли пользователей.", "globalIndex": 201, "tag": "10. LDAP и Kerberos"}]}, {"id": "m7", "title": "11. OAuth и OIDC", "notes": "\n<h3>Расширенный конспект: OAuth 2.0 ≠ аутентификация</h3>\n<p><b>OAuth 2.0</b> — это фреймворк авторизации: стороннее приложение получает ограниченный доступ к ресурсу без передачи пароля. Вместо пароля выдаётся <b>Access Token</b> с ограниченными правами и сроком жизни.</p>\n<table><tr><th>Роль</th><th>Кто это</th></tr>\n<tr><td>Resource Owner</td><td>Пользователь, владелец данных.</td></tr>\n<tr><td>Client</td><td>Приложение, которому нужен доступ.</td></tr>\n<tr><td>Authorization Server</td><td>Выдаёт коды/токены после согласия пользователя.</td></tr>\n<tr><td>Resource Server</td><td>API, на котором лежат защищённые ресурсы.</td></tr></table>\n<h3>Authorization Code Flow</h3>\n<ol><li>Клиент отправляет пользователя на сервер авторизации.</li><li>Пользователь входит и подтверждает доступ.</li><li>Клиент получает короткоживущий <b>authorization code</b>.</li><li>Клиент обменивает code на access token.</li></ol>\n<p>Секрет клиента можно хранить только в доверенных серверных приложениях. Мобильные и SPA-приложения не умеют безопасно хранить client secret, поэтому используется PKCE.</p>\n<h3>PKCE</h3>\n<p><b>PKCE</b> защищает от перехвата authorization code. Приложение генерирует случайный <code>code_verifier</code>, отправляет его хеш <code>code_challenge</code> на этапе авторизации, а при обмене кода на токен предъявляет исходный verifier. Если хакер перехватил code, но не знает verifier, токен он не получит.</p>\n<h3>OpenID Connect</h3>\n<p><b>OIDC</b> добавляет слой аутентификации поверх OAuth 2.0. Главный признак OIDC — scope <code>openid</code> и выдача <b>ID Token</b>, в котором есть сведения о пользователе и факте аутентификации. Access Token нужен API, ID Token нужен клиенту, чтобы понять, кто вошёл.</p>\n<div class=\"exam\"><b>Ловушка:</b> OAuth отвечает «к чему приложению можно получить доступ», OIDC отвечает «кто пользователь».</div>\n\n<hr>\n\n<h3>Главная идея OAuth 2.0</h3><p>OAuth решает проблему: как дать приложению ограниченный доступ к данным без передачи пароля. Приложение получает не пароль, а <b>access token</b> с ограниченными правами.</p>\n<table><tr><th>Роль</th><th>Кто это</th></tr>\n<tr><td>Resource Owner</td><td>Пользователь, владелец данных</td></tr>\n<tr><td>Client</td><td>Приложение, которому нужен доступ</td></tr>\n<tr><td>Authorization Server</td><td>Сервер, который выдаёт токены</td></tr>\n<tr><td>Resource Server</td><td>API/сервис, где лежат защищённые ресурсы</td></tr></table>\n<h3>OAuth ≠ аутентификация</h3><p><b>OAuth 2.0 — про авторизацию</b>: разрешить приложению доступ к ресурсу. Для входа пользователя поверх OAuth используют <b>OpenID Connect</b>.</p>\n<h3>OIDC</h3><p>OpenID Connect добавляет <b>ID Token</b>, который говорит клиенту, кто пользователь. Access Token нужен для API, ID Token — для информации о входе пользователя.</p>\n<h3>Потоки</h3><p>Для современных веб- и мобильных приложений обычно используют Authorization Code Flow с PKCE. Implicit Flow считается устаревшим для новых приложений.</p>\n<div class=\"exam\"><b>Ловушка:</b> Access Token не обязан содержать личность пользователя для клиента; для этого нужен ID Token в OIDC.</div>\n", "questions": [{"l": "11. OAuth и OIDC", "q": "Сервис печати просит доступ только к фотографиям Google. Почему передача пароля Google этому сервису плохая идея?", "o": ["Нельзя ограничить права только чтением фотографий", "Нельзя удобно отозвать доступ без смены пароля", "При взломе сервиса утечет основной пароль", "Пароль позволит больше, чем требуется задаче", "OAuth требует передавать пароль стороннему сервису"], "a": [0, 1, 2, 3], "e": "OAuth нужен, чтобы дать ограниченный и отзывной доступ без передачи основного пароля.", "globalIndex": 202, "tag": "11. OAuth и OIDC"}, {"l": "11. OAuth и OIDC", "q": "Какие роли OAuth сопоставлены верно?", "o": ["Resource Owner - владелец данных", "Client - стороннее приложение, запрашивающее доступ", "Authorization Server - проверяет пользователя и выдает токены", "Resource Server - API, где лежат защищенные данные", "KDC - сервер выдачи OAuth scope"], "a": [0, 1, 2, 3], "e": "KDC относится к Kerberos, а четыре остальные роли - базовая модель OAuth 2.0.", "globalIndex": 203, "tag": "11. OAuth и OIDC"}, {"l": "11. OAuth и OIDC", "q": "Почему Access Token безопаснее пароля в типичном OAuth-сценарии?", "o": ["Он имеет ограниченный срок жизни", "Он может иметь ограниченную область доступа scope", "Его можно отозвать, не меняя основной пароль", "Он всегда бессрочный и дает полный контроль", "Он должен храниться публично в HTML"], "a": [0, 1, 2], "e": "Токен можно ограничить по времени и правам; пароль обычно дает слишком широкий доступ.", "globalIndex": 204, "tag": "11. OAuth и OIDC"}, {"l": "11. OAuth и OIDC", "q": "Когда уместен Client Credentials Flow?", "o": ["Для межсервисного взаимодействия Machine-to-Machine", "Когда нет пользователя как Resource Owner в интерактивном смысле", "Для мобильного приложения без защиты кода авторизации PKCE", "Для выдачи Kerberos TGT", "Для скачивания писем по IMAP"], "a": [0, 1], "e": "Client Credentials используется для доступа сервиса к сервису, а не для пользовательской авторизации в браузере.", "globalIndex": 205, "tag": "11. OAuth и OIDC"}, {"l": "11. OAuth и OIDC", "q": "Почему Authorization Code Flow безопаснее прямой выдачи токена через браузер?", "o": ["Сначала выдается краткосрочный authorization code", "Обмен кода на токены выполняется на защищенном бэкенде клиента", "Access Token не обязан попадать в URL браузера", "Он требует передать пароль клиента пользователю", "Он полностью отменяет необходимость Authorization Server"], "a": [0, 1, 2], "e": "Код авторизации сам по себе еще не токен, а обмен выполняет доверенная серверная часть.", "globalIndex": 206, "tag": "11. OAuth и OIDC"}, {"l": "11. OAuth и OIDC", "q": "В мобильном приложении атакующий перехватил authorization code. Почему PKCE мешает обменять его на токен?", "o": ["Token Endpoint требует code_verifier", "Authorization Server заранее запомнил code_challenge", "У атакующего нет исходного случайного значения verifier", "PKCE шифрует все RTP-пакеты", "PKCE делает authorization code бессрочным"], "a": [0, 1, 2], "e": "PKCE связывает перехваченный код с секретом, который создало исходное приложение.", "globalIndex": 207, "tag": "11. OAuth и OIDC"}, {"l": "11. OAuth и OIDC", "q": "Какие утверждения о Token Introspection из схемы лекции верны?", "o": ["Resource Server может отправить токен на introspection endpoint", "Authorization Server возвращает сведения о валидности и свойствах токена", "Resource Server принимает решение отдать ресурс после проверки", "Introspection всегда выполняется пользователем вручную", "Introspection заменяет выдачу Access Token"], "a": [0, 1, 2], "e": "Интроспекция позволяет серверу ресурсов проверить токен у сервера авторизации.", "globalIndex": 208, "tag": "11. OAuth и OIDC"}, {"l": "11. OAuth и OIDC", "q": "Почему OAuth 2.0 сам по себе не говорит клиенту, кто пользователь?", "o": ["OAuth отвечает за авторизацию доступа к ресурсу", "Access Token означает право доступа, а не обязательно утверждение личности", "Для аутентификации поверх OAuth создан OpenID Connect", "OAuth запрещает любые токены", "Resource Server всегда возвращает паспорт пользователя"], "a": [0, 1, 2], "e": "OAuth сообщает 'что разрешено', OIDC добавляет слой 'кто пользователь'.", "globalIndex": 209, "tag": "11. OAuth и OIDC"}, {"l": "11. OAuth и OIDC", "q": "Что OIDC добавляет к OAuth 2.0?", "o": ["ID Token", "Стандартный userinfo endpoint", "Scope openid", "Федеративную аутентификацию", "NFS delegation"], "a": [0, 1, 2, 3], "e": "OIDC стандартизует получение личности пользователя через ID Token, userinfo и scope openid.", "globalIndex": 210, "tag": "11. OAuth и OIDC"}, {"l": "11. OAuth и OIDC", "q": "Что такое ID Token в OIDC?", "o": ["JWT с информацией о пользователе и факте аутентификации", "Токен, который всегда нужен только Resource Server для доступа к файлам", "Замена Refresh Token для продления доступа", "Kerberos Service Ticket"], "a": [0], "e": "ID Token предназначен клиенту для понимания личности пользователя, а не для доступа к API вместо Access Token.", "globalIndex": 211, "tag": "11. OAuth и OIDC"}, {"l": "11. OAuth и OIDC", "q": "Какой смысл scope в OAuth?", "o": ["Ограничить набор разрешений, которые получает клиент", "Сделать токен более узким по правам, чем полный доступ пользователя", "Указать размер MTU", "Заменить redirect_uri", "Определить MAC-адрес сервера"], "a": [0, 1], "e": "Scope описывает, что именно клиент может делать с выданным токеном: читать профиль, отправлять письма, работать с файлами и т.п.", "globalIndex": 212, "tag": "11. OAuth и OIDC"}, {"l": "11. OAuth и OIDC", "q": "Зачем в OAuth/OIDC нужен redirect_uri?", "o": ["Чтобы сервер авторизации знал, куда вернуть пользователя после входа", "Чтобы код авторизации вернулся только на заранее разрешенный адрес", "Чтобы клиент мог принимать результат авторизации", "Чтобы заменить TLS-сертификат", "Чтобы DNS выбрал ближайший CDN"], "a": [0, 1, 2], "e": "redirect_uri — критичная часть безопасности OAuth. Его обычно заранее регистрируют, чтобы код не ушел на чужой адрес.", "globalIndex": 213, "tag": "11. OAuth и OIDC"}, {"l": "11. OAuth и OIDC", "q": "Чем ID Token в OIDC отличается от Access Token в OAuth?", "o": ["ID Token содержит утверждения об аутентификации пользователя для клиента", "Access Token предназначен для доступа к защищенному API/ресурсу", "ID Token обычно проверяется клиентом", "Access Token всегда является паролем пользователя", "ID Token нужен для выбора MTU"], "a": [0, 1, 2], "e": "OIDC добавляет слой идентичности поверх OAuth. ID Token говорит клиенту, кто пользователь, а Access Token предъявляется API.", "globalIndex": 214, "tag": "11. OAuth и OIDC"}]}, {"id": "m8", "title": "12. SSH", "notes": "\n<h3>Расширенный конспект: зачем SSH</h3>\n<p><b>SSH</b> — защищённый прикладной протокол удалённого доступа, обычно TCP/22. Он заменяет небезопасные Telnet/FTP-сценарии, где логины и пароли передавались открытым текстом. SSH даёт конфиденциальность, целостность и аутентификацию.</p>\n<h3>Три криптографические идеи</h3>\n<table><tr><th>Механизм</th><th>Зачем нужен</th></tr>\n<tr><td>Обмен ключами</td><td>Например Диффи–Хеллман: согласовать общий симметричный ключ.</td></tr>\n<tr><td>Симметричное шифрование</td><td>AES/ChaCha20 быстро шифрует основной поток данных.</td></tr>\n<tr><td>Асимметричные ключи/подписи</td><td>Проверка сервера и пользователя, работа публичного/приватного ключа.</td></tr></table>\n<h3>known_hosts, authorized_keys, ssh-agent</h3>\n<table><tr><th>Файл/утилита</th><th>Роль</th></tr>\n<tr><td><code>known_hosts</code></td><td>Клиент запоминает публичные ключи серверов, чтобы заметить MITM/подмену.</td></tr>\n<tr><td><code>authorized_keys</code></td><td>На сервере хранит публичные ключи пользователей, которым разрешён вход.</td></tr>\n<tr><td><code>ssh-agent</code></td><td>Хранит расшифрованные приватные ключи в оперативной памяти и подписывает запросы, чтобы не вводить пароль постоянно.</td></tr></table>\n<p>Для входа по ключу публичный ключ пользователя копируют на сервер в <code>~/.ssh/authorized_keys</code> с корректными правами доступа. Приватный ключ остаётся у пользователя и не отправляется на сервер.</p>\n<div class=\"exam\"><b>Ловушка:</b> ssh-agent не является сервером аутентификации домена и не генерирует ключи на каждую сессию. Он хранит ключи и выполняет операции подписи.</div>\n\n<hr>\n\n<h3>Что такое SSH</h3><p>SSH — защищённый протокол удалённого доступа. Обычно работает на TCP-порту 22. Он заменил небезопасные Telnet и частично FTP, которые передавали пароли открытым текстом.</p>\n<h3>Три основы безопасности SSH</h3><table><tr><th>Механизм</th><th>Зачем</th></tr>\n<tr><td>Симметричное шифрование</td><td>Быстро шифрует основной трафик после установки соединения</td></tr>\n<tr><td>Асимметричная криптография</td><td>Помогает согласовать ключи и проверить подлинность</td></tr>\n<tr><td>MAC/хэш</td><td>Контроль целостности сообщений</td></tr></table>\n<h3>Ключи и known_hosts</h3><p>У сервера есть host key. Клиент запоминает его в <code>known_hosts</code>. Если ключ сервера неожиданно изменился, возможна атака Man-in-the-Middle или переустановка сервера — нужно проверять.</p>\n<h3>Аутентификация пользователя</h3><p>Можно входить по паролю или по ключу. При входе по ключу открытый ключ лежит на сервере в <code>authorized_keys</code>, а закрытый остаётся у пользователя.</p>\n<div class=\"exam\"><b>Ловушка:</b> приватный ключ нельзя отправлять на сервер. Серверу нужен только публичный ключ.</div>\n", "questions": [{"l": "12. SSH", "q": "Почему SSH решает проблему Telnet и классического FTP?", "o": ["Шифрует трафик, включая учетные данные", "Проверяет подлинность сервера через host key", "Контролирует целостность передаваемых данных", "Передает пароли в plaintext, но быстрее", "Работает только в локальной сети без интернета"], "a": [0, 1, 2], "e": "SSH защищает канал от чтения, изменения и подмены стороны соединения.", "globalIndex": 215, "tag": "12. SSH"}, {"l": "12. SSH", "q": "Почему SSH использует и симметричную, и асимметричную криптографию?", "o": ["Симметричная быстрее для основного потока данных", "Асимметричная удобна для обмена секретом и аутентификации", "Сессионный симметричный ключ создается заново для каждой сессии", "Асимметричная всегда используется для шифрования каждого байта основного потока", "Симметричная криптография нужна только для DNS"], "a": [0, 1, 2], "e": "SSH сочетает скорость симметричного шифра с возможностями асимметричных ключей на этапе установления доверия.", "globalIndex": 216, "tag": "12. SSH"}, {"l": "12. SSH", "q": "Что происходит при обмене ключами Диффи-Хеллмана в SSH?", "o": ["Клиент и сервер вырабатывают общий секрет", "Сам секретный ключ не передается по сети", "На этом этапе клиент проверяет host key сервера", "Пользовательский пароль передается до создания защищенного канала", "Diffie-Hellman заменяет TCP handshake"], "a": [0, 1, 2], "e": "DH позволяет получить общий секрет по открытому каналу, а проверка host key защищает от подставного сервера.", "globalIndex": 217, "tag": "12. SSH"}, {"l": "12. SSH", "q": "Какая последовательность жизненного цикла SSH-соединения наиболее корректна?", "o": ["TCP handshake -> согласование алгоритмов -> обмен ключами -> аутентификация клиента -> мультиплексированный канал", "Аутентификация паролем -> TCP handshake -> DiffServ -> POP3", "LDAP bind -> SMTP DATA -> SSH host key -> RTP", "RTSP PLAY -> OAuth scope -> SFTP"], "a": [0], "e": "Сначала создается транспорт и защищенный канал, затем уже проверяется пользователь и открываются каналы.", "globalIndex": 218, "tag": "12. SS ode>, <code>172.16.0.0/12</code>, <code>192.168.0.0/16</code>. Если IP назначения подходит под несколько маршрутов, используется <b>longest prefix match</b> — самый длинный/точный префикс.</p>\n<p>RIP ограничен 15 hops и плохо масштабируется. OSPF использует алгоритм Дейкстры внутри автономной системы. BGP — протокол внешней маршрутизации между автономными системами, учитывает политики маршрутизации, а не только техническую кратчайшую дистанцию.</p>\n<h3>Канальный уровень, Ethernet, Wi‑Fi</h3>\n<p>Канальный уровень передаёт кадры между непосредственно связанными устройствами и использует MAC-адреса. Ошибки часто выявляются CRC/FCS. Ethernet исторически связан с ALOHA и Робертом Меткалфом; классический Ethernet использовал CSMA/CD: слушать среду и обнаруживать коллизии. Wi‑Fi использует CSMA/CA: коллизии трудно обнаружить в радиоэфире, поэтому их стараются избегать.</p>\n<table><tr><th>Тема</th><th>Коротко</th></tr>\n<tr><td>ARP spoofing</td><td>Ложный ARP: «IP шлюза — это мой MAC».</td></tr>\n<tr><td>PoE</td><td>Питание по Ethernet; важны мощность стандарта, длина кабеля, качество жил.</td></tr>\n<tr><td>WPA2-Enterprise</td><td>Использует RADIUS/802.1X для индивидуальной аутентификации.</td></tr></table>\n<div class=\"exam\"><b>Формула:</b> IP отвечает «куда дальше между сетями», Ethernet/Wi‑Fi — «как доставить соседу в текущем сегменте».</div>\n\n<hr>\n\n<h3>TCP/UDP</h3>\n<table><tr><th>TCP</th><th>UDP</th></tr>\n<tr><td>Поток байтов, один send не равен одному recv.</td><td>Датаграммы, маленький recvfrom может отбросить остаток.</td></tr>\n<tr><td>Надёжность, порядок, handshake, отдельный сокет после accept.</td><td>Нет соединения; быстрее для коротких запросов; программист сам делает повторы/ID.</td></tr></table>\n<h3>IP и маршрутизация</h3>\n<p>IP — best effort. При совпадении нескольких маршрутов выбирается самый длинный префикс. Private IPv4: 10/8, 172.16/12, 192.168/16. IPv6 сокращается через удаление ведущих нулей и одну замену <code>::</code>.</p>\n<h3>Канальный уровень</h3>\n<p>Кадры, MAC, CRC/FCS, ARP. ARP-spoofing: злоумышленник рассылает ложное соответствие «IP шлюза → мой MAC». Ethernet использует MAC и FCS; Wi‑Fi использует CSMA/CA, RTS/CTS при hidden node, WPA2-Enterprise с RADIUS.</p>\n", "questions": [{"q": "Почему для TCP-сервера буфер приёма 1 байт допустим?", "o": ["TCP — поток байтов", "Остаток данных можно дочитать следующими recv", "Можно читать до разделителя \\r\\n", "TCP сохраняет границы каждого send"], "a": [0, 1, 2], "e": "TCP не сохраняет границы send, но непрочитанные байты остаются в потоке.", "l": "13–17. TCP/UDP, IP, канальный уровень, Ethernet, Wi‑Fi", "tag": "13–17. TCP/UDP, IP, канальный уровень, Ethernet, Wi‑Fi", "globalIndex": 226}, {"q": "Почему для UDP буфер 1 байт является ошибкой?", "o": ["Непоместившаяся часть датаграммы будет отброшена", "UDP всегда обслужит только одного клиента", "UDP включает контроль перегрузки", "UDP не поддерживает IP-фрагментацию"], "a": [0], "e": "UDP-дейтаграмму нужно принять целиком в буфер приложения; остаток нельзя дочитать позже.", "l": "13–17. TCP/UDP, IP, канальный уровень, Ethernet, Wi‑Fi", "tag": "13–17. TCP/UDP, IP, канальный уровень, Ethernet, Wi‑Fi", "globalIndex": 227}, {"q": "Зачем в Calculation 1.0 нужен \\r\\n?", "o": ["Для разделения сообщений в TCP-потоке", "Для удобного тестирования через telnet", "Потому что UDP требует \\r\\n", "Потому что так требует CGI"], "a": [0, 1], "e": "В TCP нужны границы сообщений; telnet просто делает такой формат удобным.", "l": "13–17. TCP/UDP, IP, канальный уровень, Ethernet, Wi‑Fi", "tag": "13–17. TCP/UDP, IP, канальный уровень, Ethernet, Wi‑Fi", "globalIndex": 228}, {"q": "Что такое pipelining/конвейеризация?", "o": ["Отправка нескольких запросов без ожидания каждого ответа", "Способ лучше загрузить канал при большом RTT", "Параллельная отправка через несколько сетевых карт всегда", "Переключение TCP на UDP"], "a": [0, 1], "e": "Конвейеризация уменьшает простой канала на ожидании ответов.", "l": "13–17. TC E</td><td>Защищает Authorization Code Flow для SPA/mobile: code_verifier известен только приложению, code_challenge отправляется заранее.</td></tr>\n<tr><td>WebSocket</td><td>Полезен для частых мелких сообщений и Server Push; не нужен для статических иконок.</td></tr>\n<tr><td>HTTP/2</td><td>В HTTPS обычно согласуется через TLS ALPN; даёт бинарный формат и мультиплексирование.</td></tr>\n<tr><td>XSS/CSRF</td><td>XSS — выполнение вредного кода в контексте сайта; CSRF — принудительная отправка запроса браузером жертвы.</td></tr>\n<tr><td>DNS</td><td>Transaction ID помогает сопоставлять ответы; TC означает, что ответ усечён.</td></tr>\n<tr><td>Kerberos</td><td>TGS выдаёт сервисные билеты на основе TGT; нужна синхронизация времени.</td></tr>\n<tr><td>NFS</td><td>NFSv4 — stateful, Compound RPC, безопасность; Close-to-Open — видимость после close/open.</td></tr>\n<tr><td>QoS</td><td>WFQ не оставляет поток без полосы; Token Bucket ограничивает скорость маркерами.</td></tr>\n<tr><td>FTP passive</td><td>Клиент инициирует data-соединение, поэтому проще за NAT/firewall.</td></tr>\n<tr><td>UDP</td><td>Границы датаграмм сохраняются; маленький буфер отбрасывает хвост.</td></tr></table>\n<h3>Как решать вопросы с множественным выбором</h3>\n<ul><li>Сначала ищи слова «всегда», «только», «автоматически» — это часто неверные варианты.</li><li>Разделяй аутентификацию и авторизацию: OIDC/Kerberos — про вход, OAuth — про доступ.</li><li>Разделяй уровни: MAC — локально, IP — маршрутизация, TCP/UDP — процессы и порты.</li><li>Если вопрос про безопасность, ищи, где хранится секрет: приватный ключ/пароль/code_verifier не должен уходить наружу.</li></ul>\n<div class=\"exam\"><b>Приоритет подготовки:</b> OAuth/OIDC/PKCE, TCP/UDP-сокеты, NFS, QoS, DNS, XSS/CSRF, Kerberos/LDAP, HTTP/2, Ethernet/Wi‑Fi.</div>\n\n<hr>\n\n<h3>Зачем этот блок</h3>\n<p>Здесь собраны формулировки, похожие на присланные работы: PKCE, Token Bucket, DNS hijacking, ssh-agent, POP3/IMAP, NFSv4, RTCP, WireGuard, IPsec, Kerberos, XSS/CSRF, сертификаты и QoS.</p>\n<div class=\"exam\"><b>Как пользоваться:</b> сначала проходи тематические модули, потом этот блок. Все ошибки автоматически попадают в «Слабые».</div>\n", "questions": [{"q": "Какую уязвимость устраняет PKCE в мобильных и SPA-приложениях?", "o": ["Перехват authorization code приложением с той же URI-схемой", "Подмену Refresh Token при обновлении Access Token", "DNS-spoofing сервера авторизации", "Повторное использование Access Token на разных Resource Server"], "a": [0], "e": "PKCE защищает public clients от перехвата authorization code: без code_verifier код бесполезен.", "l": "99. Тренажёр по сканам работ", "tag": "99. Тренажёр по сканам работ", "globalIndex": 243}, {"q": "Как PKCE делает перехваченный authorization code бесполезным?", "o": ["Клиент отправляет code_challenge", "Token Endpoint требует code_verifier", "У атакующего нет исходного случайного verifier", "PKCE обязательно требует 2FA при каждом обмене"], "a": [0, 1, 2], "e": "Authorization server запомнил challenge, а при обмене кода требует verifier. Перехваченного кода недостаточно.", "l": "99. Тренажёр по сканам работ", "tag": "99. Тренажёр по сканам работ", "globalIndex": 244}, {"q": "Как работает Token Bucket?", "o": ["Маркеры поступают в ведро с заданной скоростью", "Для отправки пакета нужны маркеры", "Маркеры расходуются при отправке", "Сервер всегда отправляет пакеты строго с постоянной скоростью"], "a": [0, 1, 2], "e": "Token Bucket ограничивает среднюю скорость и допускает всплески, если маркеры накопились.", "l": "99. Тренажёр по сканам работ", "tag": "99. Тренажёр по сканам работ", "globalIndex": 245}, {"q": "В чём суть DNS hijacking?", "o": ["Подмена настроек DNS-сервера/устройства, чтобы вернуть поддельный IP", "Простая перегрузка DNS-сервера запросами", "Блокировка всех DNS-запросов", "Только запись в hosts"], "a": [0], "e": "Hijacking — перенаправление разрешения имени на нужный атакующему адрес.", "l": "99. Тренажёр по сканам работ", "tag": "99. Т td></tr><tr><td>/31</td><td>2</td></tr><tr><td>/30</td><td>4</td></tr><tr><td>/29</td><td>8</td></tr><tr><td>/28</td><td>16</td></tr><tr><td>/24</td><td>256</td></tr></table>\n<h3>Люди и технологии</h3>\n<ul><li><b>Клейнрок</b> — коммутация пакетов.</li><li><b>Меткалф</b> — Ethernet.</li><li><b>Бернерс‑Ли</b> — WWW.</li><li><b>Сысоев</b> — Nginx.</li><li><b>Гейтс</b> — Microsoft.</li></ul>\n<div class=\"hint\"><b>Метод:</b> эти вопросы стоит проходить в режиме «до автоматизма», потому что они дают быстрые баллы и часто повторяются.</div>\n\n<hr>\n\n<h3>База: адреса, история сетей, маршрутизация</h3>\n<p>Этот блок закрывает короткие обязательные вопросы, которые часто спрашивают отдельно.</p>\n<table><tr><th>Термин</th><th>Что запомнить</th></tr>\n<tr><td>Octet</td><td>Ровно 8 бит. IPv4-адрес состоит из 4 октетов: например, <code>192.168.1.10</code>.</td></tr>\n<tr><td>MAC-адрес</td><td>Адрес канального уровня. Нужен внутри локального сегмента Ethernet/Wi‑Fi.</td></tr>\n<tr><td>IP-адрес</td><td>Логический адрес сетевого уровня. Нужен для маршрутизации между сетями.</td></tr>\n<tr><td>Private IP</td><td><code>10.0.0.0/8</code>, <code>172.16.0.0/12</code>, <code>192.168.0.0/16</code>.</td></tr>\n<tr><td>Longest prefix match</td><td>Если подходят несколько маршрутов, выбирается маршрут с самым длинным префиксом, то есть самый точный.</td></tr>\n<tr><td>Stateless</td><td>Сервер не обязан помнить состояние между независимыми запросами; запрос должен содержать всё нужное.</td></tr></table>\n<div class=\"exam\"><b>Для экзамена:</b> Ethernet связывают с Робертом Меткалфом, WWW — с Тимом Бернерсом‑Ли, Microsoft — с Биллом Гейтсом.</div>\n<h3>Мини-правило CIDR, которое мы тренировали</h3>\n<p>Блок CIDR всегда имеет размер степени двойки. При разбиении диапазона идём слева направо и каждый раз берём самый большой блок, который начинается в текущем адресе, правильно выровнен и не выходит за конец диапазона.</p>\n<ul><li><code>/32</code> — 1 адрес, <code>/31</code> — 2, <code>/30</code> — 4, <code>/29</code> — 8, <code>/28</code> — 16, <code>/27</code> — 32, <code>/26</code> — 64, <code>/25</code> — 128, <code>/24</code> — 256.</li>\n<li><code>/23</code> покрывает 2 полных третьих октета, <code>/22</code> — 4, <code>/21</code> — 8. Для <code>/22</code> третий октет должен быть кратен 4.</li></ul>\n", "questions": [{"l": "00-04. Обязательные вопросы из фото", "q": "Что до 2015 года занимало значительную долю интернет-трафика и часто приводилось как пример массового обмена данными между пользователями?", "o": ["P2P-сети и торренты", "Только DNS-запросы к корневым серверам", "Только SMTP-пересылка почты", "Исключительно потоковое видео через HTTP/3"], "a": [0], "e": "В лекционных примерах P2P/торренты фигурируют как источник большой доли трафика до того, как доминирование перешло к потоковому видео и крупным CDN.", "globalIndex": 269, "tag": "90. Старый банк вопросов 00–04"}, {"l": "00-04. Обязательные вопросы из фото", "q": "Что такое octet в сетевой терминологии?", "o": ["Ровно 8 бит", "Произвольное число бит от 1 до 16", "Один IP-пакет любого размера", "Только ASCII-символ", "Синоним MAC-адреса"], "a": [0], "e": "Octet используют как точный термин для 8 бит, чтобы не зависеть от исторических неоднозначностей слова byte.", "globalIndex": 270, "tag": "90. Старый банк вопросов 00–04"}, {"l": "00-04. Обязательные вопросы из фото", "q": "Кто создал технологию Ethernet?", "o": ["Роберт Меткалф", "Билл Гейтс", "Тим Бернерс-Ли", "Роберт Кан", "Леонард Клейнрок"], "a": [0], "e": "Ethernet связывают с Робертом Меткалфом и Xerox PARC. Билл Гейтс связан с Microsoft, а Тим Бернерс-Ли — с WWW/HTTP/HTML.", "globalIndex": 271, "tag": "90. Старый банк вопросов 00–04"}, {"l": "00-04. Обязательные вопросы из фото", "q": "Кто такой Билл Гейтс в контексте истории IT?", "o": ["Один из основателей Microsoft", "Создатель Ethernet", "Автор протокола HTTP", "Один из авторов TCP/IP", "Создатель Linux"], "a": [0], "e": "Билл Гейтс известен как один из основателей Micr }
function render(){renderSide(); const m=modules[moduleIndex]; const solved=m.questions.filter((_,qi)=>results[qKey(moduleIndex,qi)]).length; const pct=Math.round(solved/m.questions.length*100);
 document.getElementById('moduleCard').innerHTML=`<div class="quiz-head"><div><div class="meta">Модуль ${moduleIndex+1} из ${modules.length}</div><h2 style="margin:.1rem 0">${escapeHtml(m.title)}</h2></div><div class="meta">${solved}/${m.questions.length} вопросов</div></div><div class="progress"><div class="bar" style="width:${pct}%"></div></div><div class="tabs"><button class="tab ${tab==='lesson'?'active':''}" onclick="tab='lesson';save();render()">1. Конспект</button><button class="tab ${tab==='quiz'?'active':''}" onclick="tab='quiz';save();render()">2. Тест</button><button class="tab ${tab==='review'?'active':''}" onclick="tab='review';save();render()">3. Ошибки</button></div><div id="body"></div>`;
 if(tab==='lesson') renderLesson(); else if(tab==='quiz') renderQuiz(); else renderReview();
}
function renderLesson(){const m=modules[moduleIndex]; document.getElementById('body').innerHTML=`<div class="lesson">${m.notes}<div class="hint"><b>Как учить:</b> прочитай блок, затем нажми «Перейти к тесту». Если ошибся — открой вкладку «Ошибки», там будут объяснения.</div><div class="actions"><button class="btn" onclick="tab='quiz';save();render()">Перейти к тесту</button><button class="btn secondary" onclick="nextModule()">Следующий модуль</button></div><div class="source-note">Конспект собран в упрощённом виде из загруженных лекций и тестовых вопросов.</div></div>`;}
function renderQuiz(){const m=modules[moduleIndex]; const qi=qIndexByModule[m.id]||0; const q=m.questions[qi]; const key=qKey(moduleIndex,qi); const saved=results[key]; const selected=selections[key]|| (saved?saved.selected:[]); const type=isMulti(q)?'checkbox':'radio';
 let opts=q.o.map((o,i)=>{let cls='answer'; if(saved){const picked=saved.selected.includes(i), corr=q.a.includes(i); if(corr&&picked) cls+=' correct'; else if(corr&&!picked) cls+=' missed'; else if(!corr&&picked) cls+=' wrong';} return `<label class="${cls}"><input type="${type}" name="ans" value="${i}" ${selected.includes(i)?'checked':''} ${saved?'disabled':''} onchange="pick(${i}, this.checked)"><span>${escapeHtml(o)}</span></label>`}).join('');
 document.getElementById('body').innerHTML=`<div class="meta">Вопрос ${qi+1} из ${m.questions.length} · ${isMulti(q)?'несколько вариантов':'один вариант'} · исходный №${q.globalIndex}</div><div class="qtitle">${escapeHtml(q.q)}</div><div class="answers">${opts}</div><div id="feedback" class="feedback ${saved?(saved.correct?'ok':'bad'):''}">${saved?'<b>'+(saved.correct?'Верно':'Неверно')+'.</b> '+escapeHtml(q.e):''}</div><div class="actions"><button class="btn" onclick="check()" ${saved?'disabled':''}>Проверить</button><button class="btn secondary" onclick="prevQ()">Назад</button><button class="btn secondary" onclick="nextQ()">Дальше</button><button class="btn ghost" onclick="clearCurrent()">Стереть ответ</button></div>`;}
function pick(i,checked){const m=modules[moduleIndex], qi=qIndexByModule[m.id]||0, key=qKey(moduleIndex,qi), q=m.questions[qi]; let arr=selections[key]||[]; if(isMulti(q)){ if(checked&&!arr.includes(i)) arr.push(i); if(!checked) arr=arr.filter(x=>x!==i);} else {arr=[i];} selections[key]=arr;}
function check(){const m=modules[moduleIndex], qi=qIndexByModule[m.id]||0, q=m.questions[qi], key=qKey(moduleIndex,qi); const arr=selections[key]||[]; if(!arr.length){const f=document.getElementById('feedback'); f.className='feedback bad'; f.innerHTML='Выбери хотя бы один вариант.'; return;} results[key]={selected:arr, correct:eqArr(arr,q.a)}; save(); render();}
function nextQ(){const m=modules[moduleIndex]; let qi=qIndexByModule[m.id]||0; if(qi<m.questions.length-1){qIndexByModule[m.id]=qi+1;} else {nextModule(); return;} save(); render();}
function prevQ(){const m=modules[moduleIndex]; let qi=qIndexByModule[m.id]||0; if(qi>0) qIndexByModule[m.id]=qi-1; save(); render();}
function clearCurrent(){const m=modules[moduleIndex], qi=qIndexByModule[m.id]||0, key=qKey(moduleIndex,qi); delete results[key]; delete selections[key]; save(); render();}
function nextModule(){if(moduleIndex<modules.length-1){moduleIndex++; tab='lesson'; save(); render();}}
function renderReview(){const m=modules[moduleIndex]; const wrong=[]; m.questions.forEach((q,qi)=>{const r=results[qKey(moduleIndex,qi)]; if(r&&!r.correct) wrong.push([q,qi,r]);}); if(!wrong.length){document.getElementById('body').innerHTML='<div class="hint"><b>Пока нет ошибок в этом модуле.</b> Решай тесты, а ошибочные вопросы появятся здесь.</div>'; return;} document.getElementById('body').innerHTML=wrong.map(([q,qi,r])=>`<div class="card" style="box-shadow:none"><div class="meta">Вопрос ${qi+1}</div><b>${escapeHtml(q.q)}</b><p><b>Правильный ответ:</b> ${q.a.map(i=>escapeHtml(q.o[i])).join('; ')}</p><p><b>Объяснение:</b> ${escapeHtml(q.e)}</p><button class="btn secondary" onclick="qIndexByModule[modules[moduleIndex].id]=${qi};tab='quiz';save();render()">Перерешать</button></div>`).join('');}
function resetAll(){if(confirm('Сбросить весь прогресс?')){localStorage.removeItem('course.results');localStorage.removeItem('course.qIndexByModule');results={};qIndexByModule={};render();}}
render();
</script>
</body></html>
